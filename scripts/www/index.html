<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostMaze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a14;
            font-family: 'SimHei', 'Microsoft YaHei', sans-serif;
            touch-action: none;
        }
        
        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: none;
        }
        
        /* 状态栏样式 - 移动端适配 */
        #statusBar {
            position: absolute;
            top: 10px;
            left: 10px;
            max-width: 180px;
            padding: 10px;
            background: rgba(20, 25, 40, 0.7);
            border: 1px solid rgba(60, 70, 100, 0.6);
            border-radius: 8px;
            color: #dcdcf0;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        
        .status-row {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            gap: 5px;
        }
        
        .status-label {
            min-width: 40px;
        }
        
        .heart-container, .key-container {
            display: flex;
            gap: 3px;
        }
        
        .heart-icon, .key-icon, .map-icon {
            width: 16px;
            height: 16px;
        }
        
        .haunted-text {
            color: #ff0000;
            font-weight: bold;
            font-size: 14px;
            animation: haunted-flash 0.3s infinite;
        }
        
        @keyframes haunted-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 小地图样式 - 移动端适配 */
        #miniMap {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            background: rgba(30, 35, 50, 0.85);
            border: 1px solid rgba(60, 70, 100, 0.8);
            border-radius: 8px;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #miniMap.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #miniMapCanvas {
            width: 100%;
            height: 100%;
        }
        
        /* 游戏结束/暂停覆盖层 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 300;
            color: white;
        }
        
        #overlay.visible {
            display: flex;
        }
        
        #overlay h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        #overlay p {
            font-size: 16px;
            margin-bottom: 8px;
            color: #ccc;
        }
        
        #overlay .hint {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
        
        /* 移动端专用控制区域 */
        .mobile-controls {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }
        
        .joystick-container {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }
        
        .joystick-left {
            left: 40px;
        }
        
        /* 删除或注释掉 .joystick-right 相关样式 */
        
        /* 调整功能按钮位置 */
        .action-buttons {
            position: absolute;
            bottom: 50px;
            right: 30px; /* 调整到右侧 */
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }
        
        /* 增加一个用于捕获滑动的透明层样式（可选，这里我们直接用容器捕获） */
        
        .joystick-base {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform-origin: center center;
            position: absolute;
        }
        
<!--         .action-buttons {
            position: absolute;
            bottom: 30px;
            right: 180px;
            display: flex;
            flex-direction: column;
            gap: 10px;

        } -->
        
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.2;
        }
        
        .action-btn.active {
            background: rgba(255, 255, 255, 0.4);
            border-color: white;
        }
        
        .pause-btn-container {
            position: absolute;
            top: 10px;
            right: 10px;
            pointer-events: auto;
        }
        
        .pause-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #mapTimer {

            bottom: 165px;
            right: 10px;
            color: #ff6464;
            font-size: 14px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 100;
            display: none;
        }
        
        #loadingTip {
            display: none;
        }
    </style>
</head>

    let s = seed;
    return function() {
        s = (s * 1103515245 + 12345) & 0x7fffffff;
        return s / 0x7fffffff;
    };
}

// 限制值在范围内
function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

// 两点距离
function distance(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    return Math.sqrt(dx * dx + dy * dy);
}

// 角度归一化到 [0, 2π)
function normalizeAngle(angle) {
    while (angle < 0) angle += 2 * Math.PI;
    while (angle >= 2 * Math.PI) angle -= 2 * Math.PI;
    return angle;
}

// 颜色数组转CSS字符串
function colorToString(color, alphaOverride) {
    if (color.length === 4) {
        const alpha = alphaOverride !== undefined ? alphaOverride : color[3];
        return `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha / 255})`;
    }
    return `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
}

// 线性插值颜色
function lerpColor(color1, color2, t) {
    return [
        Math.round(color1[0] + (color2[0] - color1[0]) * t),
        Math.round(color1[1] + (color2[1] - color1[1]) * t),
        Math.round(color1[2] + (color2[2] - color1[2]) * t)
    ];
}

// 深拷贝数组
function deepCopy(arr) {
    if (!Array.isArray(arr)) return arr;
    return arr.map(item => deepCopy(item));

<script>
// ============================================================================
// 音频管理器类
// ============================================================================

class AudioManager {
    constructor() {
        this.volume = 1.0;
        this.musicVolumeFactor = 1.0;
        this.soundVolumeFactor = 0.9;
        this.paused = false;
        this.musicLoaded = false;
        
        // 音频上下文
        this.audioContext = null;
        
        // 背景音乐
        this.wanderOscillator = null;
        this.wanderGain = null;
        
        // 音效
        this.sounds = {};
        
        // 脚步声控制
        this.stepTimer = 0;
        this.stepInterval = 1000;
        this.isPlayingStep = false;
        
        // 初始化音频
        this._initAudio();
    }
    
    _initAudio() {
        try {
            // 创建音频上下文
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            this.musicLoaded = true;
            console.log("音频系统初始化成功");
        } catch (e) {
            console.warn("音频系统初始化失败:", e);
            this.musicLoaded = false;
        }
    }
    
    // 创建简单的合成音效
    _createSynthSound(frequency, duration, type = 'sine') {
        if (!this.audioContext || this.paused) return;
        
        try {
            const oscillator = this.audioContext.createOscillator();
            const gainNode = this.audioContext.createGain();
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
            
            const actualVolume = this.volume * this.soundVolumeFactor;
            gainNode.gain.setValueAtTime(actualVolume * 0.3, this.audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(this.audioContext.destination);
            
            oscillator.start();
            oscillator.stop(this.audioContext.currentTime + duration);
        } catch (e) {
            // 忽略音频错误
        }
    }
    
    // 播放脚步声
    playStepSound(moved, dt) {
        if (this.paused || !moved) {
            this.stepTimer = 0;
            return;
        }
        
        this.stepTimer += dt * 1000;
        if (this.stepTimer >= this.stepInterval) {
            this.stepTimer = 0;
            this._createSynthSound(100 + Math.random() * 50, 0.08, 'noise');
        }
    }
    
    // 播放钥匙拾取音效
    playKeySound() {
        if (this.paused) return;
        // 金色铃声效果
        this._createSynthSound(880, 0.15, 'sine');
        setTimeout(() => this._createSynthSound(1100, 0.1, 'sine'), 50);
    }
    
    // 播放爱心拾取音效
    playHeartSound() {
        if (this.paused) return;
        // 心跳声效果
        this._createSynthSound(200, 0.1, 'sine');
        setTimeout(() => this._createSynthSound(250, 0.1, 'sine'), 100);
    }
    
    // 播放地图拾取音效
    playMapSound() {
        if (this.paused) return;
        // 神秘音效
        this._createSynthSound(400, 0.2, 'triangle');
        setTimeout(() => this._createSynthSound(600, 0.15, 'triangle'), 100);
    }
    
    // 播放被抓住音效
    playCaughtSound() {
        if (this.paused) return;
        // 恐怖音效
        this._createSynthSound(150, 0.3, 'sawtooth');
        setTimeout(() => this._createSynthSound(100, 0.4, 'sawtooth'), 100);
    }
    
    // 开始背景音乐（简化的环境音效）
    startBackgroundMusic() {
        if (!this.musicLoaded || this.paused || !this.audioContext) return;
        
        try {
            // 创建低频环境音
            if (!this.wanderGain) {
                this.wanderGain = this.audioContext.createGain();
                this.wanderGain.gain.setValueAtTime(this.volume * this.musicVolumeFactor * 0.1, this.audioContext.currentTime);
                this.wanderGain.connect(this.audioContext.destination);
            }
            console.log("背景音乐已启动");
        } catch (e) {
            console.warn("背景音乐启动失败:", e);
        }
    }
    
    // 更新音乐音量（保持固定音量）
    updateMusicVolume(ghostDistance, maxDistance = 25.0) {
        if (this.paused || !this.musicLoaded || !this.wanderGain) return;
        
        const wanderVolume = this.volume * this.musicVolumeFactor * 0.1;
        try {
            this.wanderGain.gain.setValueAtTime(clamp(wanderVolume, 0, 1), this.audioContext.currentTime);
        } catch (e) {
            // 忽略
        }
    }
    
    pause() {
        this.paused = true;
        console.log("音频已暂停");
    }
    
    resume() {
        this.paused = false;
        // 确保音频上下文恢复
        if (this.audioContext && this.audioContext.state === 'suspended') {
            this.audioContext.resume();
        }
        console.log("音频已恢复");
    }
    
    setVolume(volume) {
        this.volume = clamp(volume, 0, 1);
    }
    
    stopAll() {
        this.wanderGain = null;
        this.wanderOscillator = null;
    }
}

// ============================================================================
// A* 寻路算法类
// ============================================================================

class AStarPathfinder {
    constructor(mazeGrid) {
        this.grid = mazeGrid;
        this.width = mazeGrid.length;
        this.height = mazeGrid[0].length;
    }
    
    // 节点类
    createNode(x, y, g, h, parent) {
        return {
            x: x,
            y: y,
            g: g || 0,
            h: h || 0,
            f: (g || 0) + (h || 0),
            parent: parent || null
        };
    }
    
    // 曼哈顿距离启发式
    heuristic(x1, y1, x2, y2) {
        return Math.abs(x1 - x2) + Math.abs(y1 - y2);
    }
    
    // 获取可通行邻居
    getNeighbors(node) {
        const neighbors = [];
        const directions = [[0, 1], [1, 0], [0, -1], [-1, 0]];
        
        for (const [dx, dy] of directions) {
            const nx = node.x + dx;
            const ny = node.y + dy;
            
            if (nx >= 0 && nx < this.width && ny >= 0 && ny < this.height) {
                if (this.grid[nx][ny] === 0) {
                    neighbors.push([nx, ny]);
                }
            }
        }
        return neighbors;
    }
    
    // 查找路径
    findPath(startPos, targetPos) {
        const startX = Math.floor(startPos[0]);
        const startY = Math.floor(startPos[1]);
        const targetX = Math.floor(targetPos[0]);
        const targetY = Math.floor(targetPos[1]);
        
        // 边界检查
        if (startX < 0 || startX >= this.width || startY < 0 || startY >= this.height) {
            return [];
        }
        if (targetX < 0 || targetX >= this.width || targetY < 0 || targetY >= this.height) {
            return [];
        }
        
        // 如果起点或终点是墙壁
        if (this.grid[startX][startY] === 1 || this.grid[targetX][targetY] === 1) {
            return [];
        }
        
        // 开放列表和封闭列表
        const openList = [];
        const closedSet = new Set();
        
        // 创建起始节点
        const startNode = this.createNode(
            startX, startY, 
            0, 
            this.heuristic(startX, startY, targetX, targetY)
        );
        openList.push(startNode);
        
        while (openList.length > 0) {
            // 找f值最小的节点
            openList.sort((a, b) => {
                if (a.f !== b.f) return a.f - b.f;
                return a.h - b.h;
            });
            
            const currentNode = openList.shift();
            
            // 到达目标
            if (currentNode.x === targetX && currentNode.y === targetY) {
                const path = [];
                let node = currentNode;
                while (node) {
                    path.push([node.x + 0.5, node.y + 0.5]); // 格子中心
                    node = node.parent;
                }
                return path.reverse();
            }
            
            // 加入封闭列表
            closedSet.add(`${currentNode.x},${currentNode.y}`);
            
            // 检查邻居
            for (const [nx, ny] of this.getNeighbors(currentNode)) {
                const key = `${nx},${ny}`;
                if (closedSet.has(key)) continue;
                
                const newG = currentNode.g + 1;
                
                // 检查是否已在开放列表
                let neighborInOpen = null;
                for (const node of openList) {
                    if (node.x === nx && node.y === ny) {
                        neighborInOpen = node;
                        break;
                    }
                }
                
                if (neighborInOpen) {
                    // 找到更优路径
                    if (newG < neighborInOpen.g) {
                        neighborInOpen.g = newG;
                        neighborInOpen.f = newG + neighborInOpen.h;
                        neighborInOpen.parent = currentNode;
                    }
                } else {
                    // 创建新节点
                    const neighborNode = this.createNode(
                        nx, ny, newG,
                        this.heuristic(nx, ny, targetX, targetY),
                        currentNode
                    );
                    openList.push(neighborNode);
                }
            }
        }
        
        return []; // 未找到路径
    }
}

// 生成幽灵精灵
function createGhostSprite3D(levelIndex) {
    const sprite = [];
    const center_x = 15;
    const center_y = 11;
    const body_radius = 10;
    
    // 根据关卡设置基础颜色
    let base_r, base_g, base_b;
    if (levelIndex === 0) {
        base_r = 148; base_g = 0; base_b = 211;
    } else if (levelIndex === 1) {
        base_r = 128; base_g = 0; base_b = 191;
    } else {
        base_r = 108; base_g = 0; base_b = 161;
    }
    
    // 初始化透明矩阵
    for (let y = 0; y < 30; y++) {
        sprite[y] = [];
        for (let x = 0; x < 30; x++) {
            sprite[y][x] = [0, 0, 0, 0];
        }
    }
    
    // 绘制主体
    for (let y = 0; y < 30; y++) {
        for (let x = 0; x < 30; x++) {
            const dist = Math.sqrt(Math.pow(x - center_x, 2) + Math.pow(y - center_y, 2));
            if (dist <= body_radius) {
                const intensity = 1.0 - (dist / body_radius) * 0.3;
                const r = Math.floor(base_r * intensity);
                const g = Math.floor(base_g * intensity);
                const b = Math.floor(base_b * intensity);
                sprite[y][x] = [r, g, b, 255];
            }
        }
    }
    
    // 绘制波浪底部
    const wave_height = 6;
    const wave_frequency = 0.5;
    const base_y = center_y + body_radius;
    
    for (let x = 0; x < 30; x++) {
        const wave_offset = Math.floor(wave_height * Math.sin(x * wave_frequency));
        const wave_y = base_y + wave_offset;
        
        for (let y = wave_y; y < Math.min(30, wave_y + 10); y++) {
            if (levelIndex === 0) {
                sprite[y][x] = [180, 50, 230, 255];
            } else if (levelIndex === 1) {
                sprite[y][x] = [160, 40, 210, 255];
            } else {
                sprite[y][x] = [140, 30, 190, 255];
            }
        }
    }
    
    // 绘制眼睛
    const eye_radius = 2;
    const left_eye_x = center_x - 5;
    const right_eye_x = center_x + 5;
    const eye_y = center_y - 2;
    
    for (let y = 0; y < 30; y++) {
        for (let x = 0; x < 30; x++) {
            const left_dist = Math.sqrt(Math.pow(x - left_eye_x, 2) + Math.pow(y - eye_y, 2));
            const right_dist = Math.sqrt(Math.pow(x - right_eye_x, 2) + Math.pow(y - eye_y, 2));
            
            if (left_dist <= eye_radius || right_dist <= eye_radius) {
                if (levelIndex === 2) {
                    sprite[y][x] = [100, 0, 0, 255];
                } else {
                    sprite[y][x] = [0, 0, 0, 255];
                }
            }
        }
    }
    
    return sprite;
}

<script>
// ============================================================================
// Ghost 幽灵类
// ============================================================================

class Ghost {
    constructor(mazeWidth, mazeHeight, mazeGrid, levelIndex) {
        this.radius = 0.4;
        this.width3d = 0.8;
        this.levelIndex = levelIndex;
        
        // 颜色
        this.color = LEVEL_COLORS[levelIndex].ghost;
        
        // 2D视图参数
        this.pixelSize = 8;
        
        // 3D视图参数
        this.base3dSize = 800;
        this.scale3d = 100;
        
        // 移动和追踪参数
        this.chaseRadius = LEVEL_GHOST_CHASE_RADIUS[levelIndex];
        this.slowSpeed = 0.02;
        this.fastSpeed = 0.03;
        this.currentSpeed = this.slowSpeed;
        
        // 迷宫网格
        this.mazeGrid = mazeGrid;
        
        // A*寻路器
        this.pathfinder = new AStarPathfinder(mazeGrid);
        
        // 路径追踪参数
        this.currentPath = [];
        this.currentTarget = null;
        this.pathIndex = 0;
        this.repathTimer = 0;
        this.repathInterval = 5000;
        
        // 随机游走参数
        this.walkState = "random";
        this.randomTargetTimer = 0;
        this.randomTargetInterval = 3000;
        
        // 3D精灵
        this.sprite3d = getGhostSprite(levelIndex);
        
        // 放置位置
        const pos = this._placeInMaze(mazeWidth, mazeHeight, mazeGrid);
        this.x = pos[0];
        this.y = pos[1];
        
        // 动画相关
        this.animationTimer = 0;
        this.animationSpeed = 0.05;
        this.waveOffset = 0;
        this.visible = true;
        
        // 设置初始随机目标
        this._setRandomTarget();
        
        // 缩放缓存
        this.scaledCache = {};
        
        console.log(`幽灵生成在第${levelIndex + 1}关，位置: (${this.x.toFixed(1)}, ${this.y.toFixed(1)})`);
    }
    
    _placeInMaze(mazeWidth, mazeHeight, mazeGrid) {
        const availablePositions = [];
        const centerX = Math.floor(mazeWidth / 2);
        const centerY = Math.floor(mazeHeight / 2);
        
        for (let x = 0; x < mazeWidth; x++) {
            for (let y = 0; y < mazeHeight; y++) {
                if (mazeGrid[x][y] === 0) {
                    if (Math.abs(x - centerX) > 3 || Math.abs(y - centerY) > 3) {
                        availablePositions.push([x + 0.5, y + 0.5]);
                    }
                }
            }
        }
        
        if (availablePositions.length > 0) {
            return availablePositions[Math.floor(Math.random() * availablePositions.length)];
        }
        return [mazeWidth / 2 + 0.5, mazeHeight / 2 + 0.5];
    }
    
    _setRandomTarget() {
        const availablePositions = [];
        
        for (let x = 0; x < this.mazeGrid.length; x++) {
            for (let y = 0; y < this.mazeGrid[0].length; y++) {
                if (this.mazeGrid[x][y] === 0) {
                    if (Math.abs(x - Math.floor(this.x)) > 2 || Math.abs(y - Math.floor(this.y)) > 2) {
                        availablePositions.push([x + 0.5, y + 0.5]);
                    }
                }
            }
        }
        
        if (availablePositions.length > 0) {
            this.currentTarget = availablePositions[Math.floor(Math.random() * availablePositions.length)];
            this.currentPath = this.pathfinder.findPath([this.x, this.y], this.currentTarget);
            this.pathIndex = 0;
            this.randomTargetTimer = Date.now();
        } else {
            this.currentTarget = null;
            this.currentPath = [];
        }
    }
    
    _findPathToPlayer(playerX, playerY) {
        this.currentTarget = [playerX, playerY];
        this.currentPath = this.pathfinder.findPath([this.x, this.y], [playerX, playerY]);
        this.pathIndex = 0;
        this.repathTimer = Date.now();
    }
    
    _followPath(dt) {
        if (!this.currentPath || this.pathIndex >= this.currentPath.length) {
            return false;
        }
        
        const target = this.currentPath[this.pathIndex];
        const targetX = target[0];
        const targetY = target[1];
        
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < 0.1) {
            this.pathIndex++;
            if (this.pathIndex >= this.currentPath.length) {
                return true;
            }
            return this._followPath(dt);
        }
        
        const moveX = (dx / dist) * this.currentSpeed;
        const moveY = (dy / dist) * this.currentSpeed;
        
        const newX = this.x + moveX;
        const newY = this.y + moveY;
        
        if (!this._checkCollision(newX, newY)) {
            this.x = newX;
            this.y = newY;
        } else {
            this.pathIndex++;
        }
        
        return false;
    }
    
    _checkCollision(x, y) {
        const points = [
            [x, y],
            [x + this.radius, y],
            [x - this.radius, y],
            [x, y + this.radius],
            [x, y - this.radius],
            [x + this.radius * 0.7, y + this.radius * 0.7],
            [x - this.radius * 0.7, y + this.radius * 0.7],
            [x + this.radius * 0.7, y - this.radius * 0.7],
            [x - this.radius * 0.7, y - this.radius * 0.7]
        ];
        
        for (const [px, py] of points) {
            if (px < 0 || px >= this.mazeGrid.length || py < 0 || py >= this.mazeGrid[0].length) {
                return true;
            }
            if (this.mazeGrid[Math.floor(px)][Math.floor(py)] === 1) {
                return true;
            }
        }
        return false;
    }
    
    hasWallBetween(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist === 0) return false;
        
        const stepSize = 0.1;
        const steps = Math.floor(dist / stepSize) + 1;
        const stepX = dx / steps;
        const stepY = dy / steps;
        
        for (let i = 0; i <= steps; i++) {
            const checkX = x1 + stepX * i;
            const checkY = y1 + stepY * i;
            
            if (checkX < 0 || checkX >= this.mazeGrid.length || 
                checkY < 0 || checkY >= this.mazeGrid[0].length) {
                return true;
            }
            
            if (this.mazeGrid[Math.floor(checkX)][Math.floor(checkY)] === 1) {
                return true;
            }
        }
        return false;
    }
    
    update(dt, playerX, playerY) {
        // 更新动画
        this.animationTimer += dt * 1000;
        this.waveOffset = Math.sin(this.animationTimer * this.animationSpeed * 0.001) * 0.1;
        
        // 计算到玩家的距离
        const dx = playerX - this.x;
        const dy = playerY - this.y;
        const distanceToPlayer = Math.sqrt(dx * dx + dy * dy);
        
        const currentTime = Date.now();
        
        // 检查是否有墙阻挡
        const hasWall = this.hasWallBetween(this.x, this.y, playerX, playerY);
        
        // 决定幽灵状态和速度
        if (!hasWall) {
            // 无墙体阻挡，可以看到玩家
            if (this.walkState !== "chase") {
                this.walkState = "chase";
                this.currentSpeed = this.fastSpeed;
                this._findPathToPlayer(playerX, playerY);
            } else {
                if (currentTime - this.repathTimer > this.repathInterval) {
                    this._findPathToPlayer(playerX, playerY);
                }
            }
        } else {
            // 有墙体阻挡
            if (distanceToPlayer < this.chaseRadius) {
                // 在追踪范围内
                if (this.walkState !== "chase") {
                    this.walkState = "chase";
                    this.currentSpeed = this.slowSpeed;
                    this._findPathToPlayer(playerX, playerY);
                } else {
                    if (currentTime - this.repathTimer > this.repathInterval) {
                        this._findPathToPlayer(playerX, playerY);
                    }
                }
            } else {
                // 在追踪范围外，随机游走
                if (this.walkState !== "random") {
                    this.walkState = "random";
                    this.currentSpeed = this.slowSpeed;
                    this._setRandomTarget();
                } else {
                    if (currentTime - this.randomTargetTimer > this.randomTargetInterval) {
                        this._setRandomTarget();
                    }
                }
            }
        }
        
        // 沿路径移动
        if (this.currentPath.length > 0) {
            const reachedTarget = this._followPath(dt * 1000);
            if (reachedTarget) {
                if (this.walkState === "random") {
                    this._setRandomTarget();
                } else if (this.walkState === "chase") {
                    this._findPathToPlayer(playerX, playerY);
                }
            }
        } else {
            if (this.walkState === "random") {
                this._setRandomTarget();
            } else if (this.walkState === "chase") {
                this._findPathToPlayer(playerX, playerY);
            }
        }
    }
    
    getDistanceToPlayer(playerX, playerY) {
        const dx = this.x - playerX;
        const dy = this.y - playerY;
        return Math.sqrt(dx * dx + dy * dy);
    }
    
    getRelativePosition(playerX, playerY, playerAngle) {
        const dx = this.x - playerX;
        const dy = this.y - playerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angleToGhost = Math.atan2(dy, dx);
        
        let relativeAngle = angleToGhost - playerAngle;
        while (relativeAngle > Math.PI) relativeAngle -= 2 * Math.PI;
        while (relativeAngle < -Math.PI) relativeAngle += 2 * Math.PI;
        
        return [dist, relativeAngle];
    }
    
    getScreenPosition(playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight) {
        if (!this.visible) {
            return [0, 0, 0, false, 0, 0];
        }
        
        const [dist, relativeAngle] = this.getRelativePosition(playerX, playerY, playerAngle);
        
        if (dist > GHOST_MAX_VISIBLE_DISTANCE) {
            return [0, 0, 0, false, 0, 0];
        }
        
        const fovRad = (fovDegrees * Math.PI) / 180;
        
        // 检查是否在视野内
        if (Math.abs(relativeAngle) > fovRad / 2) {
            return [0, 0, 0, false, 0, 0];
        }
        
        // 计算屏幕x坐标
        const screenXRatio = 0.5 + (relativeAngle / fovRad);
        const screenX = screenXRatio * screenWidth;
        
        // 根据距离计算大小
        let size = Math.floor(this.base3dSize / (dist + 0.5));
        size = clamp(size, 50, 1000);
        
        // 计算y位置
        const eyeHeight = viewHeight / 2;
        const projectionFactor = viewHeight * 0.5;
        const floorY = eyeHeight + (projectionFactor / dist);
        const screenY = Math.min(viewHeight, Math.floor(floorY));
        
        // 透明度
        const alpha = Math.max(120, 255 - Math.floor(dist * 8));
        
        // 宽度投影
        let screenWidthProjection = (this.width3d / (dist + 0.5)) * (screenWidth / Math.tan(fovRad / 2));
        screenWidthProjection = Math.floor(Math.max(10, screenWidthProjection));
        
        return [screenX, screenY, size, true, alpha, screenWidthProjection];
    }
    
    draw2D(ctx, offsetX, offsetY, cellSize) {
        if (!this.visible) return;
        
        const ghostScreenX = offsetX + this.x * cellSize;
        const ghostScreenY = offsetY + this.y * cellSize;
        
        // 绘制幽灵像素画
        const scale = 3;
        for (let py = 0; py < 8; py++) {
            for (let px = 0; px < 8; px++) {
                if (GHOST_SPRITE_2D[py][px] === 1) {
                    ctx.fillStyle = colorToString(this.color);
                    ctx.fillRect(
                        ghostScreenX + (px - 4) * scale,
                        ghostScreenY + (py - 4) * scale,
                        scale, scale
                    );
                }
            }
        }
    }
    
    draw3D(ctx, playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight, wallDistances, lineWidth) {
        const [screenX, screenY, ghostSize, ghostVisible, alpha, ghostScreenWidth] = 
            this.getScreenPosition(playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight);
        
        if (!ghostVisible || ghostSize < 20) return;
        
        const ghostDistance = this.getDistanceToPlayer(playerX, playerY);
        
        // 遮挡检测
        const centerScreenX = screenX;
        const rayIdx = clamp(Math.floor(centerScreenX / lineWidth), 0, wallDistances.length - 1);
        const wallDistAtCenter = wallDistances[rayIdx] || MAX_VIEW_DISTANCE;
        
        if (ghostDistance > wallDistAtCenter) return;
        
        // 绘制精灵
        const scaledWidth = Math.floor(ghostScreenWidth);
        const scaledHeight = Math.floor(ghostSize);
        
        if (scaledWidth < 2 || scaledHeight < 2) return;
        
        // 绘制幽灵精灵
        const sprite = this.sprite3d;
        const drawX = Math.floor(screenX - scaledWidth / 2);
        const drawY = Math.floor(screenY - scaledHeight);
        
        ctx.save();
        ctx.globalAlpha = alpha / 255;
        
        for (let y = 0; y < 30; y++) {
            for (let x = 0; x < 30; x++) {
                const pixel = sprite[y][x];
                if (pixel[3] > 0) {
                    const px = drawX + Math.floor((x / 30) * scaledWidth);
                    const py = drawY + Math.floor((y / 30) * scaledHeight);
                    const pw = Math.max(1, Math.ceil(scaledWidth / 30));
                    const ph = Math.max(1, Math.ceil(scaledHeight / 30));
                    
                    ctx.fillStyle = colorToString(pixel);
                    ctx.fillRect(px, py, pw, ph);
                }
            }
        }
        
        ctx.restore();
    }
    
    // 重置位置
    resetPosition(mazeWidth, mazeHeight) {
        const pos = this._placeInMaze(mazeWidth, mazeHeight, this.mazeGrid);
        this.x = pos[0];
        this.y = pos[1];
        this._setRandomTarget();
        this.walkState = "random";
        this.currentSpeed = this.slowSpeed;
    }
}

class Key {
    constructor(mazeWidth, mazeHeight, mazeGrid, levelIndex) {
        this.radius = 0.4;
        this.width3d = 0.2;
        this.levelIndex = levelIndex;
        this.color = LEVEL_COLORS[levelIndex].key;
        
        // 位置和状态
        const pos = this._placeInMaze(mazeWidth, mazeHeight, mazeGrid);
        this.x = pos[0];
        this.y = pos[1];
        this.collected = false;
        this.visible = true;
        
        // 2D参数
        this.pixelSize = 8;
        
        // 3D参数
        this.base3dSize = KEY_SIZE_3D_BASE;
        this.sprite3d = getKeySprite(levelIndex);
        
        // 动画
        this.animationTimer = 0;
        this.floatSpeed = 0.003;
        this.floatOffset = 0;
        this.floatAmplitude = 1;
        
        // 缓存
        this.scaledCache = {};
    }
    
    _placeInMaze(mazeWidth, mazeHeight, mazeGrid) {
        const availablePositions = [];
        const centerX = Math.floor(mazeWidth / 2);
        const centerY = Math.floor(mazeHeight / 2);
        
        for (let x = 0; x < mazeWidth; x++) {
            for (let y = 0; y < mazeHeight; y++) {
                if (mazeGrid[x][y] === 0) {
                    if (Math.abs(x - centerX) > 2 || Math.abs(y - centerY) > 2) {
                        availablePositions.push([x + 0.5, y + 0.5]);
                    }
                }
            }
        }
        
        if (availablePositions.length > 0) {
            return availablePositions[Math.floor(Math.random() * availablePositions.length)];
        }
        return [mazeWidth / 2 + 2.5, mazeHeight / 2 + 2.5];
    }
    
    update(dt, playerX, playerY) {
        if (this.collected) {
            this.visible = false;
            return;
        }
        
        // 更新浮动动画
        this.animationTimer += dt * 1000;
        this.floatOffset = Math.sin(this.animationTimer * this.floatSpeed) * this.floatAmplitude;
    }
    
    getDistanceToPlayer(playerX, playerY) {
        const dx = this.x - playerX;
        const dy = this.y - playerY;
        return Math.sqrt(dx * dx + dy * dy);
    }
    
    isNearPlayer(playerX, playerY) {
        if (this.collected) return false;
        return this.getDistanceToPlayer(playerX, playerY) < KEY_PICKUP_DISTANCE;
    }
    
    collect() {
        if (!this.collected) {
            this.collected = true;
            this.visible = false;
            audioManager.playKeySound();
            return true;
        }
        return false;
    }
    
    getRelativePosition(playerX, playerY, playerAngle) {
        const dx = this.x - playerX;
        const dy = this.y - playerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angleToKey = Math.atan2(dy, dx);
        
        let relativeAngle = angleToKey - playerAngle;
        while (relativeAngle > Math.PI) relativeAngle -= 2 * Math.PI;
        while (relativeAngle < -Math.PI) relativeAngle += 2 * Math.PI;
        
        return [dist, relativeAngle];
    }
    
    getScreenPosition(playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight) {
        if (!this.visible || this.collected) {
            return [0, 0, 0, false, 0, 0];
        }
        
        const [dist, relativeAngle] = this.getRelativePosition(playerX, playerY, playerAngle);
        const fovRad = (fovDegrees * Math.PI) / 180;
        
        if (Math.abs(relativeAngle) > fovRad / 2) {
            return [0, 0, 0, false, 0, 0];
        }
        
        const screenXRatio = 0.5 + (relativeAngle / fovRad);
        const screenX = screenXRatio * screenWidth;
        
        let size = Math.floor(this.base3dSize / (dist + 0.5));
        size = clamp(size, 20, 500);
        
        const eyeHeight = viewHeight / 2;
        const projectionFactor = viewHeight * 0.5;
        const floatHeight = 0.2 + this.floatOffset * 0.05;
        const floorY = eyeHeight + (projectionFactor / dist) - (floatHeight * projectionFactor / dist);
        const screenY = Math.min(viewHeight, Math.floor(floorY));
        
        const alpha = Math.max(150, 255 - Math.floor(dist * 10));
        
        let screenWidthProjection = (this.width3d / (dist + 0.5)) * (screenWidth / Math.tan(fovRad / 2));
        screenWidthProjection = Math.floor(Math.max(8, screenWidthProjection));
        
        return [screenX, screenY, size, true, alpha, screenWidthProjection];
    }
    
    draw2D(ctx, offsetX, offsetY, cellSize) {
        if (!this.visible || this.collected) return;
        
        const keyScreenX = offsetX + this.x * cellSize;
        const keyScreenY = offsetY + this.y * cellSize;
        
        const scale = 3;
        
        // 绘制发光效果
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = colorToString(this.color);
        ctx.beginPath();
        ctx.arc(keyScreenX, keyScreenY, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        
        // 绘制钥匙
        for (let py = 0; py < 8; py++) {
            for (let px = 0; px < 8; px++) {
                if (KEY_SPRITE_2D[py][px] === 1) {
                    ctx.fillStyle = colorToString(this.color);
                    ctx.fillRect(
                        keyScreenX + (px - 4) * scale,
                        keyScreenY + (py - 4) * scale,
                        scale, scale
                    );
                }
            }
        }
    }
    
    draw3D(ctx, playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight, wallDistances, lineWidth) {
        const [screenX, screenY, keySize, keyVisible, alpha, keyScreenWidth] = 
            this.getScreenPosition(playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight);
        
        if (!keyVisible || keySize < 10 || this.collected) return;
        
        const keyDistance = this.getDistanceToPlayer(playerX, playerY);
        
        // 遮挡检测
        const centerScreenX = screenX;
        const rayIdx = clamp(Math.floor(centerScreenX / lineWidth), 0, wallDistances.length - 1);
        const wallDistAtCenter = wallDistances[rayIdx] || MAX_VIEW_DISTANCE;
        
        if (keyDistance > wallDistAtCenter) return;
        
        const scaledWidth = Math.floor(keyScreenWidth);
        const scaledHeight = Math.floor(keySize);
        
        if (scaledWidth < 2 || scaledHeight < 2) return;
        
        const sprite = this.sprite3d;
        const drawX = Math.floor(screenX - scaledWidth / 2);
        const drawY = Math.floor(screenY - scaledHeight);
        
        ctx.save();
        ctx.globalAlpha = alpha / 255;
        
        for (let y = 0; y < 30; y++) {
            for (let x = 0; x < 30; x++) {
                const pixel = sprite[y][x];
                if (pixel[3] > 0) {
                    const px = drawX + Math.floor((x / 30) * scaledWidth);
                    const py = drawY + Math.floor((y / 30) * scaledHeight);
                    const pw = Math.max(1, Math.ceil(scaledWidth / 30));
                    const ph = Math.max(1, Math.ceil(scaledHeight / 30));
                    
                    ctx.fillStyle = colorToString(pixel);
                    ctx.fillRect(px, py, pw, ph);
                }
            }
        }
        
        ctx.restore();
    }
}

    _placeInMaze(mazeWidth, mazeHeight, mazeGrid) {

                    }
                }
            }

        }

        this.floatOffset = Math.sin(this.animationTimer * this.floatSpeed) * this.floatAmplitude;
        
        // 更新脉动动画
        this.pulseTimer += dt * 1000;
        this.pulseScale = 1.0 + 0.1 * Math.sin(this.pulseTimer * this.pulseSpeed);
    }
    
    getDistanceToPlayer(playerX, playerY) {
        const dx = this.x - playerX;
        const dy = this.y - playerY;
        return Math.sqrt(dx * dx + dy * dy);

    }
    
    collect() {
        if (!this.collected) {
            this.collected = true;
            this.visible = false;
            audioManager.playHeartSound();
            return true;
        }
        return false;
    }
    
    getRelativePosition(playerX, playerY, playerAngle) {
        const dx = this.x - playerX;
        const dy = this.y - playerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angleToHeart = Math.atan2(dy, dx);
        
        let relativeAngle = angleToHeart - playerAngle;
        while (relativeAngle > Math.PI) relativeAngle -= 2 * Math.PI;
        while (relativeAngle < -Math.PI) relativeAngle += 2 * Math.PI;
        
        return [dist, relativeAngle];
    }
    
    getScreenPosition(playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight) {
        if (!this.visible || this.collected) {
            return [0, 0, 0, false, 0, 0];
        }
        
        const [dist, relativeAngle] = this.getRelativePosition(playerX, playerY, playerAngle);
        const fovRad = (fovDegrees * Math.PI) / 180;
        
        if (Math.abs(relativeAngle) > fovRad / 2) {
            return [0, 0, 0, false, 0, 0];
        }
        
        const screenXRatio = 0.5 + (relativeAngle / fovRad);
        const screenX = screenXRatio * screenWidth;
        
        let baseSize = Math.floor(this.base3dSize / (dist + 0.5));
        let size = Math.floor(baseSize * this.pulseScale);
        size = clamp(size, 20, 400);
        
        const eyeHeight = viewHeight / 2;
        const projectionFactor = viewHeight * 0.5;
        const floatHeight = 0.2 + this.floatOffset * 0.05;
        const floorY = eyeHeight + (projectionFactor / dist) - (floatHeight * projectionFactor / dist);
        const screenY = Math.min(viewHeight, Math.floor(floorY));
        
        const alpha = Math.max(150, 255 - Math.floor(dist * 10));
        
        let baseWidthProjection = (this.width3d / (dist + 0.5)) * (screenWidth / Math.tan(fovRad / 2));
        let screenWidthProjection = Math.floor(baseWidthProjection * this.pulseScale);
        screenWidthProjection = Math.floor(Math.max(8, screenWidthProjection));
        
        return [screenX, screenY, size, true, alpha, screenWidthProjection];
    }
    
    draw2D(ctx, offsetX, offsetY, cellSize) {
        if (!this.visible || this.collected) return;
        
        const heartScreenX = offsetX + this.x * cellSize;
        const heartScreenY = offsetY + this.y * cellSize;
        
        const scale = 3;
        
        // 绘制发光效果
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = colorToString(this.color);
        ctx.beginPath();
        ctx.arc(heartScreenX, heartScreenY, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        
        // 绘制爱心
        for (let py = 0; py < 8; py++) {
            for (let px = 0; px < 8; px++) {
                if (HEART_SPRITE_2D[py][px] === 1) {
                    ctx.fillStyle = colorToString(this.color);
                    ctx.fillRect(
                        heartScreenX + (px - 4) * scale,
                        heartScreenY + (py - 4) * scale,
                        scale, scale
                    );
                }
            }
        }
    }
    
    draw3D(ctx, playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight, wallDistances, lineWidth) {
        const [screenX, screenY, heartSize, heartVisible, alpha, heartScreenWidth] = 
            this.getScreenPosition(playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight);
        
        if (!heartVisible || heartSize < 10 || this.collected) return;
        
        const heartDistance = this.getDistanceToPlayer(playerX, playerY);
        
        // 遮挡检测
        const centerScreenX = screenX;
        const rayIdx = clamp(Math.floor(centerScreenX / lineWidth), 0, wallDistances.length - 1);
        const wallDistAtCenter = wallDistances[rayIdx] || MAX_VIEW_DISTANCE;
        
        if (heartDistance > wallDistAtCenter) return;
        
        const scaledWidth = Math.floor(heartScreenWidth);
        const scaledHeight = Math.floor(heartSize);
        
        if (scaledWidth < 2 || scaledHeight < 2) return;
        
        const sprite = this.sprite3d;
        const drawX = Math.floor(screenX - scaledWidth / 2);
        const drawY = Math.floor(screenY - scaledHeight);
        
        ctx.save();
        ctx.globalAlpha = alpha / 255;
        
        for (let y = 0; y < 30; y++) {
            for (let x = 0; x < 30; x++) {
                const pixel = sprite[y][x];
                if (pixel[3] > 0) {
                    const px = drawX + Math.floor((x / 30) * scaledWidth);
                    const py = drawY + Math.floor((y / 30) * scaledHeight);
                    const pw = Math.max(1, Math.ceil(scaledWidth / 30));
                    const ph = Math.max(1, Math.ceil(scaledHeight / 30));
                    
                    ctx.fillStyle = colorToString(pixel);
                    ctx.fillRect(px, py, pw, ph);
                }
            }
        }
        
        // 脉动发光效果
        if (alpha > 150 && this.pulseScale > 1.05) {
            const pulseAlpha = Math.floor((this.pulseScale - 1.0) * 100);
            ctx.globalAlpha = pulseAlpha / 255;
            ctx.fillStyle = 'rgba(255, 150, 150, ' + (pulseAlpha / 255) + ')';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY - scaledHeight / 4, scaledWidth / 2 + 3, scaledHeight / 4 + 3, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.restore();
    }
}

        const angleToMap = Math.atan2(dy, dx);
        
        let relativeAngle = angleToMap - playerAngle;

        const floorY = eyeHeight + (projectionFactor / dist) - (mapHeight * projectionFactor / dist);
        const screenY = Math.min(viewHeight, Math.floor(floorY));
        
        const alpha = Math.max(150, 255 - Math.floor(dist * 10));
        
        let screenWidthProjection = (this.width3d / (dist + 0.5)) * (screenWidth / Math.tan(fovRad / 2));
        screenWidthProjection = Math.floor(Math.max(8, screenWidthProjection));
        
        return [screenX, screenY, size, true, alpha, screenWidthProjection];
    }
    
    draw2D(ctx, offsetX, offsetY, cellSize) {
        if (!this.visible || this.collected) return;
        
        const mapScreenX = offsetX + this.x * cellSize;
        const mapScreenY = offsetY + this.y * cellSize;
        
        const scale = 3;
        
        // 绘制发光效果
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = colorToString(this.color);
        ctx.beginPath();
        ctx.arc(mapScreenX, mapScreenY, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        
        // 绘制地图
        for (let py = 0; py < 8; py++) {
            for (let px = 0; px < 8; px++) {
                if (MAP_SPRITE_2D[py][px] === 1) {
                    ctx.fillStyle = colorToString(this.color);
                    ctx.fillRect(
                        mapScreenX + (px - 4) * scale,
                        mapScreenY + (py - 4) * scale,
                        scale, scale
                    );
                }
            }
        }
    }
    
    draw3D(ctx, playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight, wallDistances, lineWidth) {
        const [screenX, screenY, mapSize, mapVisible, alpha, mapScreenWidth] = 
            this.getScreenPosition(playerX, playerY, playerAngle, fovDegrees, screenWidth, viewHeight);
        
        if (!mapVisible || mapSize < 10 || this.collected) return;
        
        const mapDistance = this.getDistanceToPlayer(playerX, playerY);
        
        // 遮挡检测
        const centerScreenX = screenX;
        const rayIdx = clamp(Math.floor(centerScreenX / lineWidth), 0, wallDistances.length - 1);
        const wallDistAtCenter = wallDistances[rayIdx] || MAX_VIEW_DISTANCE;
        
        if (mapDistance > wallDistAtCenter) return;
        
        const scaledWidth = Math.floor(mapScreenWidth);
        const scaledHeight = Math.floor(mapSize);
        
        if (scaledWidth < 2 || scaledHeight < 2) return;
        
        const sprite = this.sprite3d;
        const drawX = Math.floor(screenX - scaledWidth / 2);
        const drawY = Math.floor(screenY - scaledHeight);
        
        ctx.save();
        ctx.globalAlpha = alpha / 255;
        
        // 应用旋转效果
        if (this.rotationAngle !== 0) {
            ctx.translate(screenX, screenY - scaledHeight / 2);
            ctx.rotate(this.rotationAngle * 0.5);
            ctx.translate(-screenX, -(screenY - scaledHeight / 2));
        }
        
        for (let y = 0; y < 30; y++) {
            for (let x = 0; x < 30; x++) {
                const pixel = sprite[y][x];
                if (pixel[3] > 0) {
                    const px = drawX + Math.floor((x / 30) * scaledWidth);
                    const py = drawY + Math.floor((y / 30) * scaledHeight);
                    const pw = Math.max(1, Math.ceil(scaledWidth / 30));
                    const ph = Math.max(1, Math.ceil(scaledHeight / 30));
                    
                    ctx.fillStyle = colorToString(pixel);
                    ctx.fillRect(px, py, pw, ph);
                }
            }
        }
        
        ctx.restore();
    }
}
