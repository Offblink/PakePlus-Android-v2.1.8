<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音频放大器 | 实时声音增强</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .mic-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 100%);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        
        .mic-icon::after {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 0; }
            100% { transform: scale(1.1); opacity: 0; }
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            flex: 1;
            padding: 18px 20px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-start {
            background: linear-gradient(to right, #00b09b, #96c93d);
            color: white;
        }
        
        .btn-stop {
            background: linear-gradient(to right, #FF416C, #FF4B2B);
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn:not(:disabled):active {
            transform: translateY(3px);
        }
        
        .volume-control {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
        }
        
        .volume-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .volume-label {
            font-size: 16px;
            font-weight: 500;
        }
        
        .volume-value {
            font-size: 20px;
            font-weight: 700;
            color: #96c93d;
        }
        
        .slider-container {
            position: relative;
            height: 40px;
            display: flex;
            align-items: center;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }
        
        .slider-min, .slider-max {
            position: absolute;
            top: 20px;
            font-size: 12px;
            opacity: 0.8;
        }
        
        .slider-min {
            left: 0;
        }
        
        .slider-max {
            right: 0;
        }
        
        .status-container {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .status-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #FF416C;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .status-title {
            font-size: 16px;
            font-weight: 500;
        }
        
        .status-text {
            font-size: 18px;
            min-height: 27px;
            display: flex;
            align-items: center;
        }
        
        .status-active {
            color: #96c93d;
        }
        
        .status-inactive {
            color: #FF416C;
        }
        
        .tips {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            font-size: 14px;
        }
        
        .tips h3 {
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tips ul {
            padding-left: 20px;
            opacity: 0.9;
        }
        
        .tips li {
            margin-bottom: 8px;
        }
        
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 14px;
            }
            
            .mic-icon {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
            
            .mic-icon::after {
                width: 100px;
                height: 100px;
            }
            
            .btn {
                padding: 16px 15px;
                font-size: 16px;
            }
        }
        
        /* 暗色模式支持 */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-volume-up"></i> 音频放大器</h1>
            <p class="subtitle">实时采集并放大您的声音</p>
        </header>
        
        <div class="mic-icon">
            <i class="fas fa-microphone"></i>
        </div>
        
        <div class="controls">
            <div class="buttons">
                <button id="startBtn" class="btn btn-start">
                    <i class="fas fa-play"></i> 开始
                </button>
                <button id="stopBtn" class="btn btn-stop" disabled>
                    <i class="fas fa-stop"></i> 停止
                </button>
            </div>
            
            <div class="volume-control">
                <div class="volume-header">
                    <div class="volume-label">音量放大倍数</div>
                    <div class="volume-value" id="volumeValue">2.0x</div>
                </div>
                <div class="slider-container">
                    <input type="range" id="volumeSlider" min="1" max="10" step="0.5" value="2">
                    <div class="slider-min">1x</div>
                    <div class="slider-max">10x</div>
                </div>
            </div>
        </div>
        
        <div class="status-container">
            <div class="status-header">
                <div class="status-icon" id="statusIcon">●</div>
                <div class="status-title">系统状态</div>
            </div>
            <div class="status-text" id="statusText">等待启动...</div>
        </div>
        
        <div class="tips">
            <h3><i class="fas fa-lightbulb"></i> 使用提示</h3>
            <ul>
                <li>点击"开始"按钮允许麦克风访问权限</li>
                <li>调整滑块可实时改变音量放大倍数</li>
                <li>使用耳机可避免回声和啸叫</li>
                <li>切换浏览器标签页可能会暂停音频采集</li>
            </ul>
        </div>
    </div>
    
    <footer>
        <p>© 2026 简易音频放大器 | 基于 Web Audio API 构建</p>
    </footer>

    <script>
        // 获取DOM元素
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        
        // 音频变量
        let audioContext;
        let microphone;
        let source;
        let gainNode;
        let currentStream;
        
        // 初始化音量显示
        volumeValue.textContent = `${volumeSlider.value}x`;
        
        // 音量滑块事件
        volumeSlider.addEventListener('input', function() {
            const volume = parseFloat(this.value);
            volumeValue.textContent = `${volume}x`;
            
            // 如果正在播放，实时更新音量
            if (gainNode) {
                gainNode.gain.value = volume;
            }
        });
        
        // 开始采集和播放
        startBtn.addEventListener('click', async () => {
            try {
                // 更新状态
                updateStatus("正在请求麦克风权限...", "warning");
                
                // 获取麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                
                // 保存当前流以便稍后停止
                currentStream = stream;
                
                // 创建音频上下文
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 创建音频源节点
                source = audioContext.createMediaStreamSource(stream);
                
                // 创建增益节点（用于控制音量）
                gainNode = audioContext.createGain();
                gainNode.gain.value = parseFloat(volumeSlider.value);
                
                // 连接节点：麦克风 -> 增益节点 -> 扬声器
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                // 更新状态
                updateStatus("音频放大器运行中...", "active");
                
                // 按钮状态切换
                startBtn.disabled = true;
                stopBtn.disabled = false;
                
            } catch (err) {
                console.error("音频启动错误:", err);
                updateStatus(`错误: ${err.message}`, "error");
            }
        });
        
        // 停止采集和播放
        stopBtn.addEventListener('click', () => {
            // 停止所有音频轨道
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            
            // 断开音频节点连接
            if (source) {
                source.disconnect();
            }
            
            // 关闭音频上下文
            if (audioContext && audioContext.state !== 'closed') {
                audioContext.close();
            }
            
            // 更新状态
            updateStatus("已停止音频采集", "inactive");
            
            // 按钮状态切换
            startBtn.disabled = false;
            stopBtn.disabled = true;
        });
        
        // 更新状态显示
        function updateStatus(message, type) {
            statusText.textContent = message;
            
            // 根据状态类型更新样式
            statusText.classList.remove("status-active", "status-inactive");
            statusIcon.style.backgroundColor = "#FF416C"; // 默认红色
            
            if (type === "active") {
                statusText.classList.add("status-active");
                statusIcon.style.backgroundColor = "#96c93d"; // 绿色
            } else if (type === "warning") {
                statusIcon.style.backgroundColor = "#FFA726"; // 橙色
            } else if (type === "error") {
                statusText.classList.add("status-inactive");
                statusIcon.style.backgroundColor = "#FF416C"; // 红色
            } else {
                statusText.classList.add("status-inactive");
            }
        }
        
        // 页面可见性变化处理
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && audioContext && audioContext.state === 'running') {
                // 页面切换到后台，暂停音频上下文
                audioContext.suspend().then(() => {
                    updateStatus("页面切换到后台，音频已暂停", "warning");
                });
            } else if (!document.hidden && audioContext && audioContext.state === 'suspended') {
                // 页面回到前台，恢复音频上下文
                audioContext.resume().then(() => {
                    updateStatus("音频放大器运行中...", "active");
                });
            }
        });
        
        // 防止iOS设备上的自动暂停
        document.addEventListener('touchstart', function() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });
    </script>
</body>
</html>
