<script>
// ============================================================================
// Maze 迷宫类
// ============================================================================

class Maze {
    constructor(levelIndex) {
        this.levelIndex = levelIndex;
        
        // 根据关卡索引获取迷宫尺寸
        const size = LEVEL_MAZE_SIZES[levelIndex];
        this.width = size[0];
        this.height = size[1];
        
        // 初始化网格 (1=墙, 0=路径)
        this.grid = [];
        for (let x = 0; x < this.width; x++) {
            this.grid[x] = [];
            for (let y = 0; y < this.height; y++) {
                this.grid[x][y] = 1;
            }
        }
        
        this.exitPos = null;
        this.exitDirection = null;
        
        // 道具列表
        this.ghost = null;
        this.keys = [];
        this.heart = null;
        this.mapItem = null;
        
        // 生成迷宫和道具
        this.generateMaze();
    }
    
    // 重置幽灵位置
    resetGhostPosition() {
        if (this.ghost) {
            const pos = this.ghost._placeInMaze(this.width, this.height, this.grid);
            this.ghost.x = pos[0];
            this.ghost.y = pos[1];
            this.ghost._setRandomTarget();
            this.ghost.walkState = "random";
            this.ghost.currentSpeed = this.ghost.slowSpeed;
            console.log(`幽灵已重新生成在位置 (${this.ghost.x.toFixed(1)}, ${this.ghost.y.toFixed(1)})`);
        }
    }
    
    // 生成迷宫
    generateMaze() {
        // 使用深度优先搜索生成迷宫
        // 初始化所有格子为墙
        for (let x = 0; x < this.width; x++) {
            for (let y = 0; y < this.height; y++) {
                this.grid[x][y] = 1;
            }
        }
        
        // 从中心开始
        const startX = Math.floor(this.width / 2);
        const startY = Math.floor(this.height / 2);
        this.grid[startX][startY] = 0;
        
        const stack = [[startX, startY]];
        const directions = [[0, 2], [2, 0], [0, -2], [-2, 0]];
        
        // 使用随机数生成器
        let seed = Date.now();
        const random = () => {
            seed = (seed * 1103515245 + 12345) & 0x7fffffff;
            return seed / 0x7fffffff;
        };
        
        // 打乱数组
        const shuffle = (arr) => {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };
        
        while (stack.length > 0) {
            const current = stack[stack.length - 1];
            const x = current[0];
            const y = current[1];
            
            // 打乱方向
            const shuffledDirs = shuffle([...directions]);
            let found = false;
            
            for (const dir of shuffledDirs) {
                const dx = dir[0];
                const dy = dir[1];
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx > 0 && nx < this.width - 1 && ny > 0 && ny < this.height - 1) {
                    if (this.grid[nx][ny] === 1) {
                        // 打通墙壁
                        this.grid[x + Math.floor(dx / 2)][y + Math.floor(dy / 2)] = 0;
                        this.grid[nx][ny] = 0;
                        stack.push([nx, ny]);
                        found = true;
                        break;
                    }
                }
            }
            
            if (!found) {
                stack.pop();
            }
        }
        
        // 设置出口
        const exitSide = Math.floor(random() * 4);
        if (exitSide === 0) {
            // 上
            const exitX = Math.floor(random() * (this.width - 2)) + 1;
            this.exitPos = [exitX, 0];
            this.exitDirection = 0;
            this.grid[exitX][0] = 0;
            this.grid[exitX][1] = 0;
        } else if (exitSide === 1) {
            // 右
            const exitY = Math.floor(random() * (this.height - 2)) + 1;
            this.exitPos = [this.width - 1, exitY];
            this.exitDirection = 1;
            this.grid[this.width - 1][exitY] = 0;
            this.grid[this.width - 2][exitY] = 0;
        } else if (exitSide === 2) {
            // 下
            const exitX = Math.floor(random() * (this.width - 2)) + 1;
            this.exitPos = [exitX, this.height - 1];
            this.exitDirection = 2;
            this.grid[exitX][this.height - 1] = 0;
            this.grid[exitX][this.height - 2] = 0;
        } else {
            // 左
            const exitY = Math.floor(random() * (this.height - 2)) + 1;
            this.exitPos = [0, exitY];
            this.exitDirection = 3;
            this.grid[0][exitY] = 0;
            this.grid[1][exitY] = 0;
        }
        
        // 确保中心区域开放
        const centerX = Math.floor(this.width / 2);
        const centerY = Math.floor(this.height / 2);
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const x = centerX + dx;
                const y = centerY + dy;
                if (x >= 0 && x < this.width && y >= 0 && y < this.height) {
                    this.grid[x][y] = 0;
                }
            }
        }
        
        // 添加额外路径提高连通度
        const extraPathsCountByLevel = [3, 10, 20];
        const extraPathsCount = extraPathsCountByLevel[this.levelIndex] || 5;
        
        console.log(`第${this.levelIndex + 1}关: 添加${extraPathsCount}条额外路径`);
        
        let extraPathsAdded = 0;
        const maxAttempts = extraPathsCount * 10;
        
        for (let attempt = 0; attempt < maxAttempts && extraPathsAdded < extraPathsCount; attempt++) {
            const x = Math.floor(random() * (this.width - 2)) + 1;
            const y = Math.floor(random() * (this.height - 2)) + 1;
            
            if (this.grid[x][y] === 1) {
                // 检查邻居
                const neighbors = [
                    [x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]
                ];
                
                let pathNeighbors = 0;
                for (const [nx, ny] of neighbors) {
                    if (nx >= 0 && nx < this.width && ny >= 0 && ny < this.height) {
                        if (this.grid[nx][ny] === 0) {
                            pathNeighbors++;
                        }
                    }
                }
                
                if (pathNeighbors >= 1) {
                    this.grid[x][y] = 0;
                    extraPathsAdded++;
                }
            }
        }
        
        console.log(`第${this.levelIndex + 1}关: 成功添加${extraPathsAdded}条额外路径`);
        
        // 确保出口可达
        this._ensureExitReachable();
        
        // 创建幽灵
        this.ghost = new Ghost(this.width, this.height, this.grid, this.levelIndex);
        
        // 创建钥匙
        this.keys = [];
        const keyCount = LEVEL_KEY_COUNTS[this.levelIndex];
        
        for (let i = 0; i < keyCount; i++) {
            let keyPlaced = false;
            let attempts = 0;
            
            while (!keyPlaced && attempts < 100) {
                const keyInstance = new Key(this.width, this.height, this.grid, this.levelIndex);
                
                // 检查是否与其他钥匙重叠
                let overlap = false;
                for (const existingKey of this.keys) {
                    if (Math.abs(keyInstance.x - existingKey.x) < 1.0 && 
                        Math.abs(keyInstance.y - existingKey.y) < 1.0) {
                        overlap = true;
                        break;
                    }
                }
                
                if (!overlap) {
                    this.keys.push(keyInstance);
                    keyPlaced = true;
                }
                attempts++;
            }
            
            if (!keyPlaced) {
                console.warn(`警告: 无法为第${i + 1}把钥匙找到合适位置`);
            }
        }
        
        console.log(`第${this.levelIndex + 1}关: 已生成${this.keys.length}把钥匙`);
        
        // 创建爱心
        this.heart = new Heart(this.width, this.height, this.grid, this.levelIndex);
        
        // 创建地图道具
        this.mapItem = new MapItem(this.width, this.height, this.grid, this.levelIndex);
        
        console.log(`第${this.levelIndex + 1}关: 地图道具已生成`);
    }
    
    _ensureExitReachable() {
        if (!this.exitPos) return;
        
        const exitX = this.exitPos[0];
        const exitY = this.exitPos[1];
        
        // 确定内部起始点
        let startX, startY;
        if (this.exitDirection === 0) {
            startX = exitX;
            startY = 1;
        } else if (this.exitDirection === 1) {
            startX = this.width - 2;
            startY = exitY;
        } else if (this.exitDirection === 2) {
            startX = exitX;
            startY = this.height - 2;
        } else {
            startX = 1;
            startY = exitY;
        }
        
        // 确保起始点是路径
        if (this.grid[startX][startY] === 1) {
            this.grid[startX][startY] = 0;
        }
        
        // BFS查找连接
        const directions = [[1, 0], [-1, 0], [0, 1], [0, -1]];
        const visited = [];
        for (let x = 0; x < this.width; x++) {
            visited[x] = [];
            for (let y = 0; y < this.height; y++) {
                visited[x][y] = false;
            }
        }
        
        const queue = [[startX, startY, []]];
        visited[startX][startY] = true;
        
        let foundPath = null;
        
        while (queue.length > 0 && !foundPath) {
            const current = queue.shift();
            const x = current[0];
            const y = current[1];
            const path = current[2];
            
            // 如果当前点是路径且不是起始点
            if (this.grid[x][y] === 0 && (x !== startX || y !== startY)) {
                foundPath = path;
                break;
            }
            
            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx >= 0 && nx < this.width && ny >= 0 && ny < this.height && !visited[nx][ny]) {
                    visited[nx][ny] = true;
                    const newPath = [...path, [nx, ny]];
                    queue.push([nx, ny, newPath]);
                }
            }
        }
        
        // 如果找到连接，打通路径
        if (foundPath) {
            for (const [px, py] of foundPath) {
                if (this.grid[px][py] === 1) {
                    this.grid[px][py] = 0;
                }
            }
            console.log(`出口已通过 ${foundPath.length} 个单元格连接到迷宫主体`);
        } else {
            // 后备方案：直通中心
            console.warn("警告：未找到现有路径连接，使用后备方案");
            
            const centerX = Math.floor(this.width / 2);
            const centerY = Math.floor(this.height / 2);
            
            let currentX = startX;
            let currentY = startY;
            
            while (currentX !== centerX || currentY !== centerY) {
                if (currentX < centerX) currentX++;
                else if (currentX > centerX) currentX--;
                else if (currentY < centerY) currentY++;
                else if (currentY > centerY) currentY--;
                
                if (currentX >= 0 && currentX < this.width && currentY >= 0 && currentY < this.height) {
                    if (this.grid[currentX][currentY] === 1) {
                        this.grid[currentX][currentY] = 0;
                    }
                } else {
                    break;
                }
            }
        }
    }
    
    isWall(x, y) {
        if (x < 0 || x >= this.width || y < 0 || y >= this.height) {
            return true;
        }
        return this.grid[Math.floor(x)][Math.floor(y)] === 1;
    }
    
    isExit(x, y) {
        if (!this.exitPos) return false;
        const exitX = this.exitPos[0];
        const exitY = this.exitPos[1];
        return Math.abs(x - exitX) < 0.5 && Math.abs(y - exitY) < 0.5;
    }
    
    getAllKeysCollected() {
        if (!this.keys || this.keys.length === 0) return true;
        for (const key of this.keys) {
            if (!key.collected) return false;
        }
        return true;
    }
    
    getKeysCollectedCount() {
        if (!this.keys) return 0;
        let count = 0;
        for (const key of this.keys) {
            if (key.collected) count++;
        }
        return count;
    }
    
    getTotalKeysCount() {
        return this.keys ? this.keys.length : 0;
    }
    
    isMapCollected() {
        return this.mapItem ? this.mapItem.collected : true;
    }
    
    draw2D(ctx, offsetX, offsetY, cellSize) {
        // 绘制迷宫
        for (let x = 0; x < this.width; x++) {
            for (let y = 0; y < this.height; y++) {
                const rectX = offsetX + x * cellSize;
                const rectY = offsetY + y * cellSize;
                
                if (this.grid[x][y] === 1) {
                    ctx.fillStyle = colorToString(LEVEL_COLORS[this.levelIndex].wall);
                    ctx.fillRect(rectX, rectY, cellSize, cellSize);
                } else {
                    ctx.fillStyle = colorToString(LEVEL_COLORS[this.levelIndex].path);
                    ctx.fillRect(rectX, rectY, cellSize, cellSize);
                    ctx.strokeStyle = 'rgb(40, 40, 50)';
                    ctx.strokeRect(rectX, rectY, cellSize, cellSize);
                }
            }
        }
        
        // 绘制出口
        if (this.exitPos) {
            const exitX = this.exitPos[0];
            const exitY = this.exitPos[1];
            const rectX = offsetX + exitX * cellSize;
            const rectY = offsetY + exitY * cellSize;
            
            ctx.fillStyle = colorToString(LEVEL_COLORS[0].exit);
            ctx.fillRect(rectX, rectY, cellSize, cellSize);
            
            // 绘制EXIT文字
            ctx.fillStyle = 'black';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('EXIT', rectX + cellSize / 2, rectY + cellSize / 2);
        }
        
        // 绘制钥匙
        for (const key of this.keys) {
            if (!key.collected) {
                key.draw2D(ctx, offsetX, offsetY, cellSize);
            }
        }
        
        // 绘制爱心
        if (this.heart && !this.heart.collected) {
            this.heart.draw2D(ctx, offsetX, offsetY, cellSize);
        }
        
        // 绘制地图
        if (this.mapItem && !this.mapItem.collected) {
            this.mapItem.draw2D(ctx, offsetX, offsetY, cellSize);
        }
        
        // 绘制幽灵
        if (this.ghost) {
            this.ghost.draw2D(ctx, offsetX, offsetY, cellSize);
        }
    }
}

// ============================================================================
// Player 玩家类
// ============================================================================

class Player {
    constructor(maze, levelIndex) {
        // 位置
        this.x = maze.width / 2 + 0.5;
        this.y = maze.height / 2 + 0.5;
        this.angle = 0;
        
        this.maze = maze;
        
        // 移动参数
        this.normalSpeed = 0.05;
        this.sprintSpeed = 0.07;
        this.speed = this.normalSpeed;
        this.rotationSpeed = 0.07;
        this.mouseSensitivity = 0.005;
        
        // 疾跑控制
        this.isSprinting = false;
        this.lastForwardPressTime = 0;
        this.doubleTapThreshold = 300;
        this.forwardKeyHeld = false;
        
        // 游戏状态
        this.reachedExit = false;
        this.mouseControl = true;
        this.triggerActive = false;
        this.radius = PLAYER_RADIUS;
        this.nearGhost = false;
        this.ghostDistance = Infinity;
        
        // 关卡系统
        this.currentLevel = levelIndex;
        this.keysCollectedInLevel = 0;
        this.totalKeysInLevel = LEVEL_KEY_COUNTS[levelIndex];
        
        // 生命值系统
        this.lives = PLAYER_INITIAL_LIVES;
        this.maxLives = PLAYER_INITIAL_LIVES;
        this.isCaught = false;
        this.gameOver = false;
        
        // 道具状态
        this.heartPickupCooldown = 0;
        this.mapCollected = false;
        this.mapRevealTimer = 0;
        this.mapVisible = false;
        
        // 渐变过渡
        this.fadeState = "none";
        this.fadeAlpha = 0;
        this.fadeTimer = 0;
        this.fadeDuration = FADE_DURATION;
        this.fadeMaxAlpha = FADE_MAX_ALPHA;
        
        // 关卡过渡
        this.levelTransitionText = "";
        this.nextLevelIndex = 0;
        
        // 重生位置
        this.spawnX = maze.width / 2 + 0.5;
        this.spawnY = maze.height / 2 + 0.5;
        this.spawnAngle = 0;
        
        console.log(`玩家初始化 - 第${this.currentLevel + 1}关，需要收集${this.totalKeysInLevel}把钥匙`);
    }
    
    // 碰撞检测
    checkCollision(x, y) {
        const points = [
            [x, y],
            [x + this.radius, y],
            [x - this.radius, y],
            [x, y + this.radius],
            [x, y - this.radius],
            [x + this.radius * 0.7, y + this.radius * 0.7],
            [x - this.radius * 0.7, y + this.radius * 0.7],
            [x + this.radius * 0.7, y - this.radius * 0.7],
            [x - this.radius * 0.7, y - this.radius * 0.7]
        ];
        
        for (const [px, py] of points) {
            if (this.maze.isWall(px, py)) {
                return true;
            }
        }
        return false;
    }
    
    // 钥匙拾取检测
    checkKeyPickup() {
        if (!this.maze.keys || this.maze.keys.length === 0) return false;
        
        let keysCollectedThisFrame = false;
        
        for (const key of this.maze.keys) {
            if (!key.collected && key.isNearPlayer(this.x, this.y)) {
                if (key.collect()) {
                    this.keysCollectedInLevel++;
                    keysCollectedThisFrame = true;
                    console.log(`钥匙已拾取！(${this.keysCollectedInLevel}/${this.totalKeysInLevel})`);
                }
            }
        }
        
        return keysCollectedThisFrame;
    }
    
    // 爱心拾取检测
    checkHeartPickup() {
        if (this.maze.heart && !this.maze.heart.collected) {
            if (this.maze.heart.isNearPlayer(this.x, this.y)) {
                if (this.maze.heart.collect()) {
                    this.lives++;
                    console.log(`爱心已拾取！生命值: ${this.lives}`);
                    return true;
                }
            }
        }
        return false;
    }
    
    // 地图拾取检测
    checkMapPickup() {
        if (this.maze.mapItem && !this.maze.mapItem.collected) {
            if (this.maze.mapItem.isNearPlayer(this.x, this.y)) {
                if (this.maze.mapItem.collect()) {
                    this.mapCollected = true;
                    this.mapVisible = true;
                    this.mapRevealTimer = Date.now();
                    console.log('地图已拾取！');
                    return true;
                }
            }
        }
        return false;
    }
    
    // 开始渐变变暗
    startFadeOut(fadeType, nextLevel) {
        this.fadeState = fadeType === "caught" ? "fading_out" : "level_transition_out";
        this.fadeTimer = 0;
        this.fadeAlpha = 0;
        
        if (fadeType === "caught") {
            this.levelTransitionText = "被幽灵抓住了！";
            audioManager.playCaughtSound();
            console.log("开始被抓渐变变暗...");
        } else {
            this.nextLevelIndex = nextLevel;
            if (nextLevel < TOTAL_LEVELS) {
                this.levelTransitionText = `第${this.currentLevel + 1}关通过！进入第${nextLevel + 1}关...`;
            } else {
                this.levelTransitionText = "恭喜！通关所有关卡！";
            }
            console.log(`开始关卡过渡: ${this.levelTransitionText}`);
        }
    }
    
    // 开始渐变恢复
    startFadeIn(fadeType) {
        this.fadeState = fadeType === "caught" ? "fading_in" : "level_transition_in";
        this.fadeTimer = 0;
        this.fadeAlpha = this.fadeMaxAlpha;
        console.log("开始渐变恢复...");
    }
    
    // 更新渐变效果
    updateFade(dt) {
        if (this.fadeState === "none") return;
        
        this.fadeTimer += dt * 1000;
        
        if (this.fadeState === "fading_out") {
            const progress = Math.min(1.0, this.fadeTimer / this.fadeDuration);
            this.fadeAlpha = Math.floor(progress * this.fadeMaxAlpha);
            
            if (progress >= 1.0) {
                this.fadeState = "dark";
                this.fadeAlpha = this.fadeMaxAlpha;
                console.log("变暗完成，准备重生...");
                
                // 重置位置
                this.resetToSpawn();
                
                // 减少生命值
                this.lives--;
                console.log(`生命值减少: ${this.lives}/${this.maxLives}`);
                
                if (this.lives <= 0) {
                    this.gameOver = true;
                    console.log("游戏结束！");
                    this.fadeState = "none";
                    this.fadeAlpha = 0;
                } else {
                    this.startFadeIn("caught");
                }
            }
        } else if (this.fadeState === "fading_in") {
            const progress = Math.min(1.0, this.fadeTimer / this.fadeDuration);
            this.fadeAlpha = Math.floor((1.0 - progress) * this.fadeMaxAlpha);
            
            if (progress >= 1.0) {
                this.fadeState = "none";
                this.fadeAlpha = 0;
                this.isCaught = false;
                console.log("渐变恢复完成");
            }
        } else if (this.fadeState === "level_transition_out") {
            const progress = Math.min(1.0, this.fadeTimer / LEVEL_TRANSITION_DURATION);
            this.fadeAlpha = Math.floor(progress * this.fadeMaxAlpha);
            
            if (progress >= 1.0) {
                this.fadeState = "dark";
                this.fadeAlpha = this.fadeMaxAlpha;
                console.log("关卡过渡变暗完成");
            }
        } else if (this.fadeState === "level_transition_in") {
            const progress = Math.min(1.0, this.fadeTimer / LEVEL_TRANSITION_DURATION);
            this.fadeAlpha = Math.floor((1.0 - progress) * this.fadeMaxAlpha);
            
            if (progress >= 1.0) {
                this.fadeState = "none";
                this.fadeAlpha = 0;
                console.log("关卡过渡渐变恢复完成");
            }
        }
    }
    
    // 重置到出生点
    resetToSpawn() {
        this.x = this.spawnX;
        this.y = this.spawnY;
        this.angle = this.spawnAngle;
        this.isCaught = false;
        
        if (this.maze) {
            this.maze.resetGhostPosition();
        }
    }
    
    // 更新出生点
    updateSpawnPosition() {
        this.spawnX = this.x;
        this.spawnY = this.y;
        this.spawnAngle = this.angle;
        console.log(`重生点更新为: (${this.spawnX.toFixed(1)}, ${this.spawnY.toFixed(1)})`);
    }
    
    // 带碰撞的移动
    moveWithCollision(dx, dy) {
        let actualDx = dx;
        let actualDy = dy;
        
        // X方向
        const newX = this.x + dx;
        if (!this.checkCollision(newX, this.y)) {
            this.x = newX;
        } else {
            // 尝试滑动
            let moved = false;
            for (let i = 0; i < 5; i++) {
                const testDx = dx * (0.8 - i * 0.15);
                const testX = this.x + testDx;
                if (!this.checkCollision(testX, this.y)) {
                    this.x = testX;
                    actualDx = testDx;
                    moved = true;
                    break;
                }
            }
            if (!moved) actualDx = 0;
        }
        
        // Y方向
        const newY = this.y + dy;
        if (!this.checkCollision(this.x, newY)) {
            this.y = newY;
        } else {
            // 尝试滑动
            let moved = false;
            for (let i = 0; i < 5; i++) {
                const testDy = dy * (0.8 - i * 0.15);
                const testY = this.y + testDy;
                if (!this.checkCollision(this.x, testY)) {
                    this.y = testY;
                    actualDy = testDy;
                    moved = true;
                    break;
                }
            }
            if (!moved) actualDy = 0;
        }
        
        return [actualDx, actualDy];
    }
    
    // 更新玩家
    update(keys, mouseRel, dt) {
        // 游戏结束不更新
        if (this.gameOver) return false;
        
        // 渐变过渡中不处理移动
        if (this.fadeState !== "none") {
            this.updateFade(dt);
            return false;
        }
        
        // 被抓住时开始渐变
        if (this.isCaught && this.fadeState === "none") {
            this.startFadeOut("caught");
            return false;
        }
        
        // 更新地图显示状态
        if (this.mapVisible) {
            const currentTime = Date.now();
            if (currentTime - this.mapRevealTimer >= MAP_REVEAL_DURATION) {
                this.mapVisible = false;
                console.log("地图显示时间结束");
            }
        }
        
        // 疾跑控制 - 双击前进键
        const currentTime = Date.now();
        const forwardPressed = keys['ArrowUp'] || keys['KeyW'];
        
        if (forwardPressed && !this.forwardKeyHeld) {
            this.forwardKeyHeld = true;
            const timeSinceLastPress = currentTime - this.lastForwardPressTime;
            
            if (timeSinceLastPress < this.doubleTapThreshold) {
                this.isSprinting = true;
                console.log("疾跑激活！");
            } else {
                this.isSprinting = false;
            }
            this.lastForwardPressTime = currentTime;
        } else if (!forwardPressed) {
            this.forwardKeyHeld = false;
        }
        
        // 设置速度
        if (this.isSprinting && forwardPressed) {
            this.speed = this.sprintSpeed;
        } else {
            this.speed = this.normalSpeed;
        }
        
        let moved = false;
        
        // 前进
        if (forwardPressed) {
            const dx = Math.cos(this.angle) * this.speed;
            const dy = Math.sin(this.angle) * this.speed;
            const [actualDx, actualDy] = this.moveWithCollision(dx, dy);
            if (Math.abs(actualDx) > 0.001 || Math.abs(actualDy) > 0.001) {
                moved = true;
            }
        }
        
        // 后退
        if (keys['ArrowDown'] || keys['KeyS']) {
            const dx = -Math.cos(this.angle) * this.speed;
            const dy = -Math.sin(this.angle) * this.speed;
            const [actualDx, actualDy] = this.moveWithCollision(dx, dy);
            if (Math.abs(actualDx) > 0.001 || Math.abs(actualDy) > 0.001) {
                moved = true;
            }
        }
        
        // 左移
        if (keys['KeyA']) {
            const dx = Math.cos(this.angle - Math.PI / 2) * this.speed;
            const dy = Math.sin(this.angle - Math.PI / 2) * this.speed;
            const [actualDx, actualDy] = this.moveWithCollision(dx, dy);
            if (Math.abs(actualDx) > 0.001 || Math.abs(actualDy) > 0.001) {
                moved = true;
            }
        }
        
        // 右移
        if (keys['KeyD']) {
            const dx = Math.cos(this.angle + Math.PI / 2) * this.speed;
            const dy = Math.sin(this.angle + Math.PI / 2) * this.speed;
            const [actualDx, actualDy] = this.moveWithCollision(dx, dy);
            if (Math.abs(actualDx) > 0.001 || Math.abs(actualDy) > 0.001) {
                moved = true;
            }
        }
        
        // 鼠标控制视角
        if (this.mouseControl && mouseRel[0] !== 0) {
            this.angle += mouseRel[0] * this.mouseSensitivity;
        } else {
            // 键盘控制视角
            if (keys['ArrowLeft']) {
                this.angle -= this.rotationSpeed;
            }
            if (keys['ArrowRight']) {
                this.angle += this.rotationSpeed;
            }
        }
        
        this.angle = normalizeAngle(this.angle);
        
        // 播放脚步声
        audioManager.playStepSound(moved, dt);
        
        // 更新爱心拾取冷却
        if (this.heartPickupCooldown > 0) {
            this.heartPickupCooldown -= dt * 1000;
        }
        
        // 检查拾取
        this.checkKeyPickup();
        
        if (this.heartPickupCooldown <= 0) {
            if (this.checkHeartPickup()) {
                this.heartPickupCooldown = 500;
            }
        }
        
        if (!this.mapCollected) {
            this.checkMapPickup();
        }
        
        // 检查出口触发区域
        this.triggerActive = this.isInTriggerZone();
        
        if (this.triggerActive && !this.reachedExit) {
            if (this.maze.getAllKeysCollected()) {
                console.log(`可以通关！按E键进入下一关`);
            } else {
                const keysNeeded = this.totalKeysInLevel - this.keysCollectedInLevel;
                console.log(`需要找到所有钥匙！还差${keysNeeded}把`);
            }
        }
        
        // 更新幽灵距离
        this.updateGhostDistance();
        
        // 检查是否被抓住
        if (!this.isCaught && !this.reachedExit && !this.gameOver) {
            if (this.ghostDistance < GHOST_CATCH_DISTANCE) {
                this.isCaught = true;
                console.log("被幽灵抓住了！");
            }
        }
        
        return moved;
    }
    
    // 是否在触发区域
    isInTriggerZone() {
        if (!this.maze.exitPos) return false;
        const exitX = this.maze.exitPos[0];
        const exitY = this.maze.exitPos[1];
        const dx = this.x - exitX;
        const dy = this.y - exitY;
        return Math.sqrt(dx * dx + dy * dy) < TRIGGER_DISTANCE;
    }
    
    // 更新幽灵距离
    updateGhostDistance() {
        if (!this.maze.ghost) {
            this.nearGhost = false;
            this.ghostDistance = Infinity;
            return;
        }
        
        this.ghostDistance = this.maze.ghost.getDistanceToPlayer(this.x, this.y);
        this.nearGhost = this.ghostDistance < TRIGGER_DISTANCE * 2;
    }
    
    // 发射射线
    castRay(angle) {
        let rayX = this.x;
        let rayY = this.y;
        const rayDirX = Math.cos(angle);
        const rayDirY = Math.sin(angle);
        
        let wallDistance = MAX_VIEW_DISTANCE;
        let hitExit = false;
        
        const maxSteps = 100;
        const stepSize = 0.1;
        
        for (let step = 0; step < maxSteps; step++) {
            rayX += rayDirX * stepSize;
            rayY += rayDirY * stepSize;
            
            if (this.maze.isWall(rayX, rayY)) {
                const dx = rayX - this.x;
                const dy = rayY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const angleDiff = angle - this.angle;
                wallDistance = Math.min(dist * Math.cos(angleDiff), MAX_VIEW_DISTANCE);
                hitExit = this.maze.isExit(rayX, rayY);
                break;
            }
        }
        
        return [wallDistance, hitExit];
    }
    
    // 获取所有射线距离
    getRayDistances() {
        const wallDistances = [];
        const hitExits = [];
        const halfFovRad = (FOV / 2) * Math.PI / 180;
        
        for (let i = 0; i < RAY_COUNT; i++) {
            const rayAngle = this.angle - halfFovRad + (i / RAY_COUNT) * (FOV * Math.PI / 180);
            const [wallDist, hitExit] = this.castRay(normalizeAngle(rayAngle));
            wallDistances.push(wallDist);
            hitExits.push(hitExit);
        }
        
        return [wallDistances, hitExits];
    }
    
    // 绘制2D视图
    draw2D(ctx, offsetX, offsetY, cellSize) {
        const playerX = offsetX + this.x * cellSize;
        const playerY = offsetY + this.y * cellSize;
        const playerRadiusPixels = Math.floor(this.radius * cellSize);
        
        // 绘制玩家
        ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].player);
        ctx.beginPath();
        ctx.arc(playerX, playerY, playerRadiusPixels, 0, Math.PI * 2);
        ctx.fill();
        
        // 绘制朝向
        const endX = playerX + Math.cos(this.angle) * playerRadiusPixels * 2;
        const endY = playerY + Math.sin(this.angle) * playerRadiusPixels * 2;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(playerX, playerY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        
        // 绘制视野
        const halfFovRad = (FOV / 2) * Math.PI / 180;
        const rayLength = cellSize * 3;
        const leftX = playerX + Math.cos(this.angle - halfFovRad) * rayLength;
        const leftY = playerY + Math.sin(this.angle - halfFovRad) * rayLength;
        const rightX = playerX + Math.cos(this.angle + halfFovRad) * rayLength;
        const rightY = playerY + Math.sin(this.angle + halfFovRad) * rayLength;
        
        ctx.strokeStyle = colorToString(LEVEL_COLORS[this.currentLevel].ray);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(playerX, playerY);
        ctx.lineTo(leftX, leftY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(playerX, playerY);
        ctx.lineTo(rightX, rightY);
        ctx.stroke();
        
        // 绘制触发区域
        if (this.triggerActive && !this.reachedExit) {
            const triggerRadius = TRIGGER_DISTANCE * cellSize;
            ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].triggerZone);
            ctx.beginPath();
            ctx.arc(playerX, playerY, triggerRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 显示提示
            ctx.fillStyle = this.maze.getAllKeysCollected() ? 
                colorToString(LEVEL_COLORS[this.currentLevel].triggerZone) : 'rgb(255, 100, 100)';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            
            const text = this.maze.getAllKeysCollected() ? 
                "按E键使用钥匙打开出口" : 
                `需要${this.totalKeysInLevel - this.keysCollectedInLevel}把钥匙才能打开出口`;
            ctx.fillText(text, playerX, playerY - triggerRadius - 10);
        }
    }
}

</script>

<script>
// ============================================================================
// Game 游戏主类 - 完整版 (含移动端适配)
// ============================================================================

class Game {
    constructor() {
        // 初始化为第一关
        this.currentLevel = 0;
        this.gameWon = false;
        this.isPaused = false;
        
        // 检测移动端
        this.isMobile = this.checkMobile();
        
        // 2D小地图显示控制
        this.showMiniMap = false;
        this.miniMapAlpha = 0;
        this.miniMapFadeState = "none";
        this.miniMapFadeTimer = 0;
        
        // Canvas设置
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        // 小地图Canvas
        this.miniMapCanvas = document.getElementById('miniMapCanvas');
        this.miniMapCtx = this.miniMapCanvas.getContext('2d');
		
		// --- 新增修复代码 START ---
        // 强制设置小地图Canvas的内部分辨率为逻辑尺寸 (240x240)
        // 这样可以确保绘制坐标计算正确，CSS会负责将其缩放到显示尺寸
        this.miniMapCanvas.width = MINI_MAP_SIZE;
        this.miniMapCanvas.height = MINI_MAP_SIZE;
        // --- 新增修复代码 END ---
        
        // 设置Canvas尺寸
        this.resizeCanvas();
        
        // 计算格子大小（用于迷你地图）
        this.cellSize = MINI_MAP_CELL_SIZE;
        this.mazeOffsetX = 0;
        this.mazeOffsetY = 0;
        
        // 创建第一关迷宫
        this.maze = new Maze(this.currentLevel);
        
        // 创建玩家
        this.player = new Player(this.maze, this.currentLevel);
        
        // 设置全局颜色
        COLORS = LEVEL_COLORS[this.currentLevel];
        
        // PC端鼠标控制
        this.mouseLocked = false;
        this.lastMouseX = 0;
        this.lastMouseY = 0;
        this.mouseRelX = 0;
        
        // 按键状态
        this.keys = {};
        
        // 时间追踪
        this.lastTime = 0;
        
        // 初始化音频
        audioManager = new AudioManager();
        
        // 移动端控制状态
        if (this.isMobile) {
            this.showMobileControls();
            this.mobileInputState = {
                moveX: 0,      // 左摇杆X (-1 to 1)
                moveY: 0,      // 左摇杆Y (-1 to 1)
                lookX: 0,      // 右摇杆X
                lookY: 0,      // 右摇杆Y
                sprint: false, // 疾跑状态
                interact: false // 交互状态
            };
            this.joysticks = {
                move: { x: 0, y: 0, identifier: null },
                look: { x: 0, y: 0, identifier: null }
            };
        }
        
        // 隐藏鼠标
        this.canvas.style.cursor = 'none';
        
        // 绑定事件
        this.bindEvents();
        
        // 更新格子大小
        this.calculateCellSize();
        this.updateMazeOffsets();
        
        // 启动背景音乐
        // 注意：移动端通常需要用户交互才能播放音频，我们在用户第一次触摸时尝试播放
        if (!this.isMobile) {
            audioManager.startBackgroundMusic();
        }
        
        console.log(`游戏初始化 - 第${this.currentLevel + 1}关开始`);
        console.log(`迷宫尺寸: ${this.maze.width}×${this.maze.height}`);
        console.log(`需要收集钥匙: ${this.player.totalKeysInLevel}把`);
        console.log(`幽灵追踪半径: ${LEVEL_GHOST_CHASE_RADIUS[this.currentLevel]}单位`);
        console.log(`设备类型: ${this.isMobile ? '移动端' : 'PC端'}`);
        console.log("控制说明:");
        if (this.isMobile) {
            console.log(" - 左侧摇杆: 移动");
            console.log(" - 右侧摇杆: 视角");
            console.log(" - 疾跑/开门按钮: 对应功能");
        } else {
            console.log(" - WASD/方向键: 移动");
            console.log(" - 鼠标: 视角转动");
            console.log(" - 双击前进键(W/↑)并按住第二下: 疾跑");
        }
        console.log(" - 空格键/暂停按钮: 暂停/继续游戏");
        console.log(" - R: 重新开始游戏");
        console.log(" - E/交互按钮: 在出口处使用钥匙进入下一关");
        console.log("游戏目标: 收集所有钥匙，避开幽灵，找到出口");
    }
    
    // 检测移动设备
    checkMobile() {
        const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const isMobileWidth = window.innerWidth < 1024; 
        const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        return hasTouch && (isMobileWidth || isMobileUA);
    }
    
    // 显示移动端控制UI
    showMobileControls() {
        const mobileControls = document.getElementById('mobileControls');
        if (mobileControls) {
            mobileControls.style.display = 'block';
        }
        const tip = document.getElementById('loadingTip');
        if(tip) tip.style.display = 'none';
    }
    
    // 调整Canvas尺寸
    resizeCanvas() {
        if (this.isMobile) {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        } else {
            this.canvas.width = BASE_WINDOW_WIDTH;
            this.canvas.height = BASE_WINDOW_HEIGHT;
        }
        WIDTH = this.canvas.width;
        HEIGHT = this.canvas.height;
    }
    
    // 计算格子大小
    calculateCellSize() {
        const maxCellWidth = Math.floor((MINI_MAP_SIZE - 20) / this.maze.width);
        const maxCellHeight = Math.floor((MINI_MAP_SIZE - 20) / this.maze.height);
        this.cellSize = Math.min(maxCellWidth, maxCellHeight, MINI_MAP_CELL_SIZE);
    }
    
    // 更新迷宫偏移
    updateMazeOffsets() {
        this.mazeOffsetX = Math.floor((MINI_MAP_SIZE - this.maze.width * this.cellSize) / 2);
        this.mazeOffsetY = Math.floor((MINI_MAP_SIZE - this.maze.height * this.cellSize) / 2);
    }
    
    // 绑定事件
    bindEvents() {
        // 键盘事件 (PC端保留)
        document.addEventListener('keydown', (e) => this.handleKeyDown(e));
        document.addEventListener('keyup', (e) => this.handleKeyUp(e));
        
        // 鼠标事件 (PC端)
        this.canvas.addEventListener('click', () => this.requestPointerLock());
        document.addEventListener('pointerlockchange', () => this.handlePointerLockChange());
        document.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        
        // 窗口大小变化
        window.addEventListener('resize', () => this.handleResize());
        
        // 移动端触控事件
        if (this.isMobile) {
            this.bindTouchEvents();
        }
    }
    
    // 请求鼠标锁定
    requestPointerLock() {
        if (!this.mouseLocked) {
            this.canvas.requestPointerLock();
        }
    }
    
    // 处理鼠标锁定变化
    handlePointerLockChange() {
        this.mouseLocked = document.pointerLockElement === this.canvas;
        if (this.mouseLocked) {
            console.log("鼠标已锁定");
        } else {
            console.log("鼠标已解锁");
        }
    }
    
    // 处理鼠标移动
    handleMouseMove(e) {
        if (this.mouseLocked) {
            this.mouseRelX = e.movementX;
        }
    }
    
    // 处理键盘按下
    handleKeyDown(e) {
        this.keys[e.code] = true;
        
        if (e.code === 'Space' && !this.player.gameOver && !this.gameWon) {
            e.preventDefault();
            this.togglePause();
        }
        
        if (e.code === 'KeyR') {
            e.preventDefault();
            this.restartGame();
        }
        
        if (e.code === 'Escape') {
            e.preventDefault();
            if (this.isPaused) {
                this.togglePause();
            }
        }
        
        if (e.code === 'KeyE') {
            e.preventDefault();
        }
    }
    
    // 处理键盘释放
    handleKeyUp(e) {
        this.keys[e.code] = false;
    }
    
    // 处理窗口大小变化
    handleResize() {
        this.resizeCanvas();
    }
    
    // 绑定触控事件
    bindTouchEvents() {
        // --- 1. 左摇杆绑定 ---
        const joystickMoveEl = document.getElementById('joystickMove');
        this.bindJoystickTouch(joystickMoveEl, 'move');
        
        // --- 2. 按钮绑定 ---
        const btnSprint = document.getElementById('btnSprint');
        const btnInteract = document.getElementById('btnInteract');
        const btnPause = document.getElementById('btnPause');
        const overlay = document.getElementById('overlay');
        
        // 疾跑按钮：模拟 Shift 键
        btnSprint.addEventListener('touchstart', (e) => {
            e.preventDefault();
            this.keys['ShiftLeft'] = true;
            btnSprint.classList.add('active');
        });
        
        btnSprint.addEventListener('touchend', (e) => {
            e.preventDefault();
            this.keys['ShiftLeft'] = false;
            btnSprint.classList.remove('active');
        });
        
        // 开门按钮：模拟 E 键
        btnInteract.addEventListener('touchstart', (e) => {
            e.preventDefault();
            this.keys['KeyE'] = true;
            btnInteract.classList.add('active');
            setTimeout(() => {
                this.keys['KeyE'] = false;
                btnInteract.classList.remove('active');
            }, 100);
        });
        
        // 暂停按钮
        btnPause.addEventListener('touchstart', (e) => {
            e.preventDefault();
            this.togglePause();
        });
        
        // --- 3. 覆盖层逻辑 (重启/继续) ---
        overlay.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // 如果游戏结束或通关，点击重启
            if (this.gameWon || this.player.gameOver) {
                this.restartGame();
            } 
            // 如果是暂停状态，点击继续
            else if (this.isPaused) {
                this.togglePause();
            }
        });
        
        // --- 4. 全屏滑动视角逻辑 ---
        const gameContainer = document.getElementById('gameContainer');
        
        // 记录用于视角控制的触摸ID和起始位置
        this.lookTouchId = null;
        this.lastTouchX = 0;
        
        // 触摸开始：寻找空白区域的触摸点作为视角控制
        gameContainer.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                
                // 检查触摸点是否在UI元素上
                const target = touch.target;
                const isUI = target.closest('.joystick-container, .action-btn, .pause-btn, #statusBar, #overlay, #miniMap');
                
                // 如果点击在空白区域，且当前没有视角控制手指，则锁定该手指
                if (!isUI && this.lookTouchId === null) {
                    this.lookTouchId = touch.identifier;
                    this.lastTouchX = touch.clientX;
                }
            }
        }, { passive: false });
        
        // 触摸移动：更新视角
        gameContainer.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                
                // 如果是控制视角的那根手指
                if (touch.identifier === this.lookTouchId) {
                    const dx = touch.clientX - this.lastTouchX;
                    
                    // 更新鼠标相对移动量，乘以灵敏度系数
                    // 如果构造函数中定义了 this.touchSensitivity 则使用，否则默认 1.8
                    const sensitivity = (this.touchSensitivity !== undefined) ? this.touchSensitivity : 2.0;
                    this.mouseRelX += dx * sensitivity;
                    
                    this.lastTouchX = touch.clientX;
                    break;
                }
            }
        }, { passive: false });
        
        // 触摸结束：释放视角控制
        gameContainer.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === this.lookTouchId) {
                    this.lookTouchId = null;
                    break;
                }
            }
        });
        
        gameContainer.addEventListener('touchcancel', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === this.lookTouchId) {
                    this.lookTouchId = null;
                    break;
                }
            }
        });
        
        // --- 5. 音频激活 ---
        document.body.addEventListener('touchstart', () => {
            if (audioManager && !audioManager.musicLoaded) {
                audioManager._initAudio();
            }
            if (audioManager && audioManager.musicLoaded && !audioManager.paused) {
                audioManager.startBackgroundMusic();
            }
        }, { once: true });
    }
    
    // 绑定摇杆事件的具体逻辑
    bindJoystickTouch(element, type) {
        const stick = element.querySelector('.joystick-stick');
        const maxDistance = 35;
        
        const processTouch = (e, isStart) => {
            const touch = e.changedTouches[0];
            const rect = element.getBoundingClientRect();
            
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > maxDistance) {
                dx = (dx / distance) * maxDistance;
                dy = (dy / distance) * maxDistance;
            }
            
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            
            if (type === 'move') {
                this.joysticks.move.x = dx / maxDistance;
                this.joysticks.move.y = dy / maxDistance;
                if (isStart) this.joysticks.move.identifier = touch.identifier;
            } else if (type === 'look') {
                this.joysticks.look.x = dx / maxDistance;
                this.joysticks.look.y = dy / maxDistance;
                if (isStart) this.joysticks.look.identifier = touch.identifier;
            }
        };
        
        const endTouch = (identifier) => {
            if (type === 'move' && this.joysticks.move.identifier === identifier) {
                this.joysticks.move.x = 0;
                this.joysticks.move.y = 0;
                this.joysticks.move.identifier = null;
                stick.style.transform = 'translate(0px, 0px)';
            } else if (type === 'look' && this.joysticks.look.identifier === identifier) {
                this.joysticks.look.x = 0;
                this.joysticks.look.y = 0;
                this.joysticks.look.identifier = null;
                stick.style.transform = 'translate(0px, 0px)';
            }
        };
        
        element.addEventListener('touchstart', (e) => {
            e.preventDefault();
            processTouch(e, true);
        });
        
        element.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if ((type === 'move' && this.joysticks.move.identifier === touch.identifier) ||
                    (type === 'look' && this.joysticks.look.identifier === touch.identifier)) {
                    const fakeEvent = { changedTouches: [touch] };
                    processTouch(fakeEvent, false);
                    break;
                }
            }
        });
        
        element.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                endTouch(e.changedTouches[i].identifier);
            }
        });
        
        element.addEventListener('touchcancel', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                endTouch(e.changedTouches[i].identifier);
            }
        });
    }
    
    // 切换暂停
    togglePause() {
        this.isPaused = !this.isPaused;
        
        if (this.isPaused) {
            audioManager.pause();
            if (this.mouseLocked) document.exitPointerLock();
            console.log("游戏已暂停");
        } else {
            audioManager.resume();
            if (!this.isMobile) this.requestPointerLock();
            console.log("游戏继续");
        }
        
        this.updateOverlay();
    }
    
    // 更新覆盖层
    updateOverlay() {
        const ov = document.getElementById('overlay');
        const title = document.getElementById('overlayTitle');
        const t1 = document.getElementById('overlayText1');
        const t2 = document.getElementById('overlayText2');
        
        if (this.gameWon) {
            title.textContent = "恭喜通关！";
            title.style.color = "#ffd700";
            t1.textContent = "你成功通过了所有关卡！";
            // 根据设备显示不同提示
            t2.textContent = this.isMobile ? "点击屏幕重新开始" : "按 R 键重新开始";
            ov.classList.add('visible');
        } else if (this.player.gameOver) {
            title.textContent = "游戏结束";
            title.style.color = "#ff3232";
            // 根据设备显示不同提示
            t1.textContent = this.isMobile ? "点击屏幕重新开始" : "按 R 键重新开始";
            t2.textContent = "";
            ov.classList.add('visible');
        } else if (this.isPaused) {
            title.textContent = "游戏暂停";
            title.style.color = "#ffffff";
            t1.textContent = this.isMobile ? "点击屏幕继续游戏" : "按 空格键 继续游戏";
            t2.textContent = "";
            ov.classList.add('visible');
        } else {
            ov.classList.remove('visible');
        }
    }
    
    // 重新开始游戏
    restartGame() {
        this.currentLevel = 0;
        this.gameWon = false;
        this.isPaused = false;
        
        COLORS = LEVEL_COLORS[0];
        
        this.maze = new Maze(0);
        this.player = new Player(this.maze, 0);
        
        this.showMiniMap = false;
        this.miniMapAlpha = 0;
        this.miniMapFadeState = "none";
        
        this.calculateCellSize();
        this.updateMazeOffsets();
        
        if (!this.isMobile && !this.mouseLocked) {
            this.requestPointerLock();
        }
        
        audioManager.resume();
        this.updateOverlay();
        
        console.log("游戏已重新开始！");
    }
    
    // 加载关卡
    loadLevel(levelIndex) {
        this.currentLevel = levelIndex;
        COLORS = LEVEL_COLORS[levelIndex];
        
        this.maze = new Maze(levelIndex);
        
        const oldLives = this.player.lives;
        const oldHeartCooldown = this.player.heartPickupCooldown;
        
        this.player = new Player(this.maze, levelIndex);
        this.player.lives = oldLives;
        this.player.heartPickupCooldown = oldHeartCooldown;
        
        this.player.mapCollected = false;
        this.player.mapVisible = false;
        this.player.mapRevealTimer = 0;
        
        this.player.updateSpawnPosition();
        
        this.showMiniMap = false;
        this.miniMapAlpha = 0;
        this.miniMapFadeState = "none";
        
        this.calculateCellSize();
        this.updateMazeOffsets();
        
        console.log(`第${levelIndex + 1}关加载完成`);
        console.log(`迷宫尺寸: ${this.maze.width}×${this.maze.height}`);
        console.log(`需要收集钥匙: ${this.player.totalKeysInLevel}把`);
        console.log(`幽灵追踪半径: ${LEVEL_GHOST_CHASE_RADIUS[levelIndex]}单位`);
        console.log(`当前生命值: ${this.player.lives}`);
    }
    
    // 切换小地图显示
    toggleMiniMap() {
        if (this.miniMapFadeState === "none" || this.miniMapFadeState === "visible") {
            if (this.showMiniMap) {
                this.miniMapFadeState = "fade_out";
                this.miniMapFadeTimer = 0;
                console.log("调试: 隐藏2D缩略图...");
            } else {
                this.miniMapFadeState = "fade_in";
                this.miniMapFadeTimer = 0;
                this.showMiniMap = true;
                console.log("调试: 显示2D缩略图...");
            }
        }
    }
    
    // 更新小地图淡入淡出
    updateMiniMapFade(dt) {
        if (this.miniMapFadeState === "none") return;
        
        this.miniMapFadeTimer += dt * 1000;
        
        if (this.miniMapFadeState === "fade_in") {
            const progress = Math.min(1.0, this.miniMapFadeTimer / MINI_MAP_FADE_DURATION);
            this.miniMapAlpha = Math.floor(progress * 255);
            
            if (progress >= 1.0) {
                this.miniMapFadeState = "visible";
                this.miniMapAlpha = 255;
            }
        } else if (this.miniMapFadeState === "fade_out") {
            const progress = Math.min(1.0, this.miniMapFadeTimer / MINI_MAP_FADE_DURATION);
            this.miniMapAlpha = Math.floor((1.0 - progress) * 255);
            
            if (progress >= 1.0) {
                this.miniMapFadeState = "none";
                this.miniMapAlpha = 0;
                this.showMiniMap = false;
            }
        }
    }
    
    // 检查关卡完成
    checkLevelCompletion() {
        if (this.player.reachedExit || this.player.fadeState !== "none") {
            return false;
        }
        
        if (this.player.triggerActive && this.maze.getAllKeysCollected()) {
            if (this.keys['KeyE']) {
                this.player.reachedExit = true;
                
                if (this.currentLevel < TOTAL_LEVELS - 1) {
                    const nextLevel = this.currentLevel + 1;
                    console.log(`第${this.currentLevel + 1}关通过！准备进入第${nextLevel + 1}关...`);
                    this.player.startFadeOut("level_transition", nextLevel);
                    return true;
                } else {
                    this.gameWon = true;
                    console.log("恭喜！通关所有关卡！");
                    this.updateOverlay();
                    return true;
                }
            }
        }
        
        return false;
    }
    
    // 处理关卡过渡
    handleLevelTransition() {
        if (this.player.fadeState === "dark" && this.player.nextLevelIndex !== undefined) {
            const nextLevel = this.player.nextLevelIndex;
            
            if (nextLevel < TOTAL_LEVELS) {
                console.log(`正在加载第${nextLevel + 1}关...`);
                this.loadLevel(nextLevel);
                this.player.startFadeIn("level_transition");
                console.log(`第${nextLevel + 1}关加载完成，开始游戏！`);
            } else {
                this.player.fadeState = "none";
                this.player.fadeAlpha = 0;
                console.log("所有关卡通关！");
            }
        }
    }
    
    // 更新游戏状态
    update(dt) {
        if (this.isPaused) return;
        
        if (this.gameWon || this.player.gameOver) {
            this.updateOverlay();
            return;
        }
        
        this.checkLevelCompletion();
        this.handleLevelTransition();
        
        let mouseRel = [0, 0];
        
        if (this.isMobile) {
            // 移动端输入处理
            
            // 1. 移动控制 (来自左摇杆)
            this.keys['KeyW'] = this.joysticks.move.y < -0.3;
            this.keys['KeyS'] = this.joysticks.move.y > 0.3;
            this.keys['KeyA'] = this.joysticks.move.x < -0.3;
            this.keys['KeyD'] = this.joysticks.move.x > 0.3;
            
            // 2. 视角控制 (来自全屏滑动注入的 mouseRelX)
            // 滑动事件已经修改了 this.mouseRelX，我们直接读取它
            mouseRel = [this.mouseRelX, 0];
            this.mouseRelX = 0; // 用完即清零，防止持续旋转
            
            // 3. 疾跑逻辑 (如果按住了疾跑键且向前移动)
            if (this.keys['ShiftLeft'] && this.keys['KeyW']) {
                this.player.isSprinting = true;
            } else {
                // 只要疾跑键松开或停止向前，就停止疾跑
                if (this.player.isSprinting) {
                    this.player.isSprinting = false;
                }
            }
            
        } else {
            // PC端输入处理
            mouseRel = [this.mouseRelX, 0];
            this.mouseRelX = 0;
        }
        
        this.player.update(this.keys, mouseRel, dt);
        
        if (this.player.fadeState !== "none") {
            this.player.updateFade(dt);
            return;
        }
        
        if (this.maze.ghost) {
            this.maze.ghost.update(dt, this.player.x, this.player.y);
        }
        
        for (const key of this.maze.keys) {
            key.update(dt, this.player.x, this.player.y);
        }
        
        if (this.maze.heart) {
            this.maze.heart.update(dt, this.player.x, this.player.y);
        }
        
        if (this.maze.mapItem) {
            this.maze.mapItem.update(dt, this.player.x, this.player.y);
        }
        
        this.updateMiniMapFade(dt);
        
        if (this.player.mapCollected) {
            if (this.player.mapVisible && !this.showMiniMap) {
                this.showMiniMap = true;
                this.miniMapFadeState = "fade_in";
                this.miniMapFadeTimer = 0;
                this.miniMapAlpha = 0;
            } else if (!this.player.mapVisible && this.showMiniMap) {
                this.toggleMiniMap();
            }
        }
        
        if (this.maze.ghost) {
            audioManager.updateMusicVolume(this.player.ghostDistance);
        }
    }
   
    // 绘制3D视图
    draw3DView() {
        const screenWidth = WIDTH;
        const screenHeight = HEIGHT;
        
        const [wallDistances, hitExits] = this.player.getRayDistances();
        const lineWidth = screenWidth / RAY_COUNT;
        
        this.ctx.fillStyle = colorToString(COLORS.bg);
        this.ctx.fillRect(0, 0, screenWidth, screenHeight);
        
        const skyHeight = screenHeight / 2;
        const skyColorTop = COLORS.skyTop;
        const skyColorBottom = COLORS.skyBottom;
        
        for (let y = 0; y < skyHeight; y++) {
            const t = y / skyHeight;
            const r = Math.floor(skyColorTop[0] * (1 - t) + skyColorBottom[0] * t);
            const g = Math.floor(skyColorTop[1] * (1 - t) + skyColorBottom[1] * t);
            const b = Math.floor(skyColorTop[2] * (1 - t) + skyColorBottom[2] * t);
            
            this.ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
            this.ctx.beginPath();
            this.ctx.moveTo(0, y);
            this.ctx.lineTo(screenWidth, y);
            this.ctx.stroke();
        }
        
        this.ctx.fillStyle = colorToString(COLORS.floor);
        this.ctx.fillRect(0, skyHeight, screenWidth, screenHeight - skyHeight);
        
        for (let i = 0; i < RAY_COUNT; i++) {
            const wallDist = wallDistances[i];
            const hitExit = hitExits[i];
            
            if (wallDist < MAX_VIEW_DISTANCE) {
                const wallHeight = Math.min(screenHeight, screenHeight * 0.8 / (wallDist + 0.1));
                const brightness = Math.max(50, 255 - wallDist * 2);
                
                let color;
                if (hitExit) {
                    color = LEVEL_COLORS[0].exit;
                } else {
                    const wallColor = COLORS.wall;
                    color = [
                        Math.floor(wallColor[0] * brightness / 255),
                        Math.floor(wallColor[1] * brightness / 255),
                        Math.floor(wallColor[2] * brightness / 255)
                    ];
                }
                
                const wallTop = Math.floor((screenHeight - wallHeight) / 2);
                const wallBottom = wallTop + wallHeight;
                
                this.ctx.fillStyle = colorToString(color);
                this.ctx.fillRect(
                    Math.floor(i * lineWidth),
                    wallTop,
                    Math.ceil(lineWidth) + 1,
                    wallHeight
                );
            }
        }
        
        if (this.maze.ghost && !this.player.gameOver) {
            this.maze.ghost.draw3D(
                this.ctx, this.player.x, this.player.y, this.player.angle,
                FOV, screenWidth, screenHeight, wallDistances, lineWidth
            );
        }
        
        for (const key of this.maze.keys) {
            if (!key.collected) {
                key.draw3D(
                    this.ctx, this.player.x, this.player.y, this.player.angle,
                    FOV, screenWidth, screenHeight, wallDistances, lineWidth
                );
            }
        }
        
        if (this.maze.heart && !this.maze.heart.collected) {
            this.maze.heart.draw3D(
                this.ctx, this.player.x, this.player.y, this.player.angle,
                FOV, screenWidth, screenHeight, wallDistances, lineWidth
            );
        }
        
        if (this.maze.mapItem && !this.maze.mapItem.collected) {
            this.maze.mapItem.draw3D(
                this.ctx, this.player.x, this.player.y, this.player.angle,
                FOV, screenWidth, screenHeight, wallDistances, lineWidth
            );
        }
        
        if (this.player.fadeAlpha > 0) {
            this.ctx.fillStyle = `rgba(0, 0, 0, ${this.player.fadeAlpha / 255})`;
            this.ctx.fillRect(0, 0, screenWidth, screenHeight);
            
            if (this.player.fadeState !== "none") {
                let text = "";
                let textColor = "#ffffff";
                
                if (this.player.fadeState === "fading_out" || this.player.fadeState === "fading_in") {
                    text = "被幽灵抓住了！";
                    textColor = "#ff6464";
                } else if (this.player.fadeState === "level_transition_out") {
                    if (this.player.nextLevelIndex < TOTAL_LEVELS) {
                        text = `第${this.currentLevel + 1}关通过！`;
                        textColor = "#64ff64";
                    } else {
                        text = "恭喜！通关所有关卡！";
                        textColor = "#ffd700";
                    }
                }
                
                if (text) {
                    this.ctx.font = "bold 36px sans-serif";
                    this.ctx.fillStyle = textColor;
                    this.ctx.textAlign = "center";
                    this.ctx.textBaseline = "middle";
                    this.ctx.fillText(text, screenWidth / 2, screenHeight / 2);
                }
            }
        }
    }
    
    // 绘制小地图
    drawMiniMap() {
        if (!this.showMiniMap || this.miniMapAlpha <= 0) return;
        
        const miniMapDiv = document.getElementById('miniMap');
        miniMapDiv.classList.remove('hidden');
        miniMapDiv.style.opacity = this.miniMapAlpha / 255;
        
        const ctx = this.miniMapCtx;
        const size = MINI_MAP_SIZE;
        
        ctx.clearRect(0, 0, size, size);
        
        ctx.fillStyle = 'rgba(30, 35, 50, 0.9)';
        ctx.fillRect(0, 0, size, size);
        
        ctx.strokeStyle = 'rgba(60, 70, 100, 0.8)';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, size, size);
        
        const cellSize = this.cellSize;
        const offsetX = this.mazeOffsetX;
        const offsetY = this.mazeOffsetY;
        
        for (let x = 0; x < this.maze.width; x++) {
            for (let y = 0; y < this.maze.height; y++) {
                const rectX = offsetX + x * cellSize;
                const rectY = offsetY + y * cellSize;
                
                if (this.maze.grid[x][y] === 1) {
                    ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].wall);
                    ctx.fillRect(rectX, rectY, cellSize, cellSize);
                } else {
                    ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].path);
                    ctx.fillRect(rectX, rectY, cellSize, cellSize);
                    ctx.strokeStyle = 'rgb(40, 40, 50)';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(rectX, rectY, cellSize, cellSize);
                }
            }
        }
        
        if (this.maze.exitPos) {
            const exitX = this.maze.exitPos[0];
            const exitY = this.maze.exitPos[1];
            const rectX = offsetX + exitX * cellSize;
            const rectY = offsetY + exitY * cellSize;
            
            ctx.fillStyle = colorToString(LEVEL_COLORS[0].exit);
            ctx.fillRect(rectX, rectY, cellSize, cellSize);
            
            ctx.fillStyle = 'black';
            ctx.font = '8px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('E', rectX + cellSize / 2, rectY + cellSize / 2);
        }
        
        const playerX = offsetX + this.player.x * cellSize;
        const playerY = offsetY + this.player.y * cellSize;
        const playerRadius = Math.max(2, Math.floor(cellSize * 0.3));
        
        ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].player);
        ctx.beginPath();
        ctx.arc(playerX, playerY, playerRadius, 0, Math.PI * 2);
        ctx.fill();
        
        const endX = playerX + Math.cos(this.player.angle) * playerRadius * 2;
        const endY = playerY + Math.sin(this.player.angle) * playerRadius * 2;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(playerX, playerY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        
        if (this.maze.ghost) {
            const ghostX = offsetX + this.maze.ghost.x * cellSize;
            const ghostY = offsetY + this.maze.ghost.y * cellSize;
            const ghostRadius = Math.max(2, Math.floor(cellSize * 0.4));
            
            ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].ghost);
            ctx.beginPath();
            ctx.arc(ghostX, ghostY, ghostRadius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        for (const key of this.maze.keys) {
            if (!key.collected) {
                const keyX = offsetX + key.x * cellSize;
                const keyY = offsetY + key.y * cellSize;
                const keySize = Math.max(2, Math.floor(cellSize * 0.6));
                
                ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].key);
                ctx.fillRect(keyX - keySize / 2, keyY - keySize / 2, keySize, keySize);
            }
        }
        
        if (this.maze.heart && !this.maze.heart.collected) {
            const heartX = offsetX + this.maze.heart.x * cellSize;
            const heartY = offsetY + this.maze.heart.y * cellSize;
            const heartSize = Math.max(2, Math.floor(cellSize * 0.6));
            
            ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].heart);
            ctx.beginPath();
            ctx.arc(heartX, heartY, heartSize / 2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        if (this.maze.mapItem && !this.maze.mapItem.collected) {
            const mapX = offsetX + this.maze.mapItem.x * cellSize;
            const mapY = offsetY + this.maze.mapItem.y * cellSize;
            const mapSize = Math.max(2, Math.floor(cellSize * 0.6));
            
            ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].map);
            ctx.fillRect(mapX - mapSize / 2, mapY - mapSize / 2, mapSize, mapSize);
        }
        
        ctx.fillStyle = colorToString(LEVEL_COLORS[this.currentLevel].text);
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(`第${this.currentLevel + 1}关地图`, size / 2, 5);
        
        if (this.player.mapVisible) {
            const currentTime = Date.now();
            const timeLeft = Math.max(0, MAP_REVEAL_DURATION - (currentTime - this.player.mapRevealTimer));
            const secondsLeft = Math.ceil(timeLeft / 1000);
            
            const mapTimerDiv = document.getElementById('mapTimer');
            if (secondsLeft <= 5 && secondsLeft > 0) {
                mapTimerDiv.style.display = 'block';
                mapTimerDiv.textContent = secondsLeft;
            } else {
                mapTimerDiv.style.display = 'none';
            }
        } else {
            document.getElementById('mapTimer').style.display = 'none';
        }
    }
    
    // 更新UI
    updateUI() {
        const heartsContainer = document.getElementById('heartsContainer');
        heartsContainer.innerHTML = '';
        
        for (let i = 0; i < this.player.lives; i++) {
            const heartDiv = document.createElement('div');
            heartDiv.className = 'heart-icon';
            heartDiv.innerHTML = this.createHeartSVG();
            heartsContainer.appendChild(heartDiv);
        }
        
        const keysCollected = this.maze.getKeysCollectedCount();
        const keysTotal = this.maze.getTotalKeysCount();
        document.getElementById('keyStatus').textContent = `${keysCollected}/${keysTotal}`;
        
        const keysContainer = document.getElementById('keysContainer');
        keysContainer.innerHTML = '';
        
        for (let i = 0; i < keysTotal; i++) {
            const keyDiv = document.createElement('div');
            keyDiv.className = 'key-icon';
            const collected = i < keysCollected;
            keyDiv.innerHTML = this.createKeySVG(collected);
            keysContainer.appendChild(keyDiv);
        }
        
        const mapStatus = document.getElementById('mapStatus');
        if (this.player.mapCollected) {
            mapStatus.textContent = "已获取";
            mapStatus.style.color = colorToString(LEVEL_COLORS[this.currentLevel].mapUI);
        } else {
            mapStatus.textContent = "未获取";
            mapStatus.style.color = "rgb(100, 100, 100)";
        }
        
        document.getElementById('levelStatus').textContent = `${this.currentLevel + 1}/${TOTAL_LEVELS}`;
        
        const hauntedWarning = document.getElementById('hauntedWarning');
        if (this.player.nearGhost && !this.player.reachedExit && !this.player.gameOver) {
            hauntedWarning.style.display = 'flex';
        } else {
            hauntedWarning.style.display = 'none';
        }
        
        if (!this.showMiniMap) {
            document.getElementById('miniMap').classList.add('hidden');
            document.getElementById('mapTimer').style.display = 'none';
        }
    }
    
    // 创建爱心SVG
    createHeartSVG() {
        return `<svg viewBox="0 0 8 8" width="16" height="16">
            <path d="M2 1 C0 1, 0 3, 2 4 L4 6 L6 4 C8 3, 8 1, 6 1 C5 1, 4 2, 4 2 C4 2, 3 1, 2 1" 
                  fill="${colorToString(LEVEL_COLORS[this.currentLevel].heartUI)}"/>
        </svg>`;
    }
    
    // 创建钥匙SVG
    createKeySVG(collected) {
        const color = collected ? 
            colorToString(LEVEL_COLORS[this.currentLevel].keyUI) : 
            'rgb(100, 100, 100)';
        
        return `<svg viewBox="0 0 8 8" width="16" height="16">
            <rect x="0" y="2" width="1" height="1" fill="${color}"/>
            <rect x="1" y="2" width="1" height="1" fill="${color}"/>
            <rect x="2" y="2" width="1" height="1" fill="${color}"/>
            <rect x="3" y="2" width="1" height="1" fill="${color}"/>
            <rect x="0" y="3" width="1" height="1" fill="${color}"/>
            <rect x="3" y="3" width="1" height="1" fill="${color}"/>
            <rect x="0" y="4" width="1" height="1" fill="${color}"/>
            <rect x="3" y="4" width="1" height="1" fill="${color}"/>
            <rect x="4" y="4" width="1" height="1" fill="${color}"/>
            <rect x="5" y="4" width="1" height="1" fill="${color}"/>
            <rect x="6" y="4" width="1" height="1" fill="${color}"/>
            <rect x="7" y="4" width="1" height="1" fill="${color}"/>
            <rect x="0" y="5" width="1" height="1" fill="${color}"/>
            <rect x="1" y="5" width="1" height="1" fill="${color}"/>
            <rect x="2" y="5" width="1" height="1" fill="${color}"/>
            <rect x="3" y="5" width="1" height="1" fill="${color}"/>
            <rect x="5" y="5" width="1" height="1" fill="${color}"/>
            <rect x="7" y="5" width="1" height="1" fill="${color}"/>
        </svg>`;
    }
    
    // 绘制
    draw() {
        this.draw3DView();
        this.drawMiniMap();
        this.updateUI();
    }
    
    // 主循环
    run(timestamp) {
        if (this.lastTime === 0) {
            this.lastTime = timestamp;
        }
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
        this.lastTime = timestamp;
        
        this.update(dt);
        this.draw();
        
        requestAnimationFrame((t) => this.run(t));
    }
    
    // 启动游戏
    start() {
        console.log("游戏开始！");
        this.lastTime = 0;
        requestAnimationFrame((t) => this.run(t));
    }
}

// ============================================================================
// 游戏启动
// ============================================================================

// 等待DOM加载完成
document.addEventListener('DOMContentLoaded', () => {
    // 创建游戏实例
    const game = new Game();
    
    // 启动游戏
    game.start();
    
    // 点击画布时请求鼠标锁定
    document.getElementById('gameCanvas').addEventListener('click', () => {
        if (!game.mouseLocked && !game.isPaused && !game.gameWon && !game.player.gameOver) {
            game.canvas.requestPointerLock();
        }
    });
});

</script>
